<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Login</title>
<link href="style.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-5" style="max-width:400px;">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">Login</h3>
        <input type="email" id="email" class="form-control mb-2" placeholder="Email" value="sishohanr786@gmail.com">
        <div class="input-group mb-3">
            <input type="password" id="password" class="form-control" placeholder="Password">
            <button class="btn btn-outline-secondary" type="button" id="togglePass">Show</button>
        </div>
        <button class="btn btn-primary w-100 mb-2" id="loginBtn">Login</button>
        <button class="btn btn-secondary w-100" id="forgotBtn">Forgot Password</button>
        <p class="text-center mt-3"><a href="register.html">Create New Account</a></p>
        <div id="loginMsg" class="text-center text-danger mt-2"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
authDomain: "fir-i-family-mart.firebaseapp.com",
projectId: "fir-i-family-mart",
storageBucket: "fir-i-family-mart.firebasestorage.app",
messagingSenderId: "73889024539",
appId: "1:73889024539:web:271561c9dba17b5a6b06be"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loginBtn = document.getElementById('loginBtn');
loginBtn.addEventListener('click', async ()=>{
    const email=document.getElementById('email').value;
    const pass=document.getElementById('password').value;
    try{
        await signInWithEmailAndPassword(auth,email,pass);
        window.location="index.html";
    }catch(e){document.getElementById('loginMsg').innerText=e.message;}
});

document.getElementById('forgotBtn').addEventListener('click', async ()=>{
    const email=document.getElementById('email').value;
    if(!email){alert("Enter email!"); return;}
    try{await sendPasswordResetEmail(auth,email); alert("Password reset email sent!");}
    catch(e){alert(e.message);}
});

document.getElementById('togglePass').addEventListener('click', ()=>{
    const p=document.getElementById('password');
    p.type=p.type==='password'?'text':'password';
});
</script>
</body>
</html>
