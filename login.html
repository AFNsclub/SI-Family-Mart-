<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | S.I. Family Mart</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-5" style="max-width:400px">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-3">Login</h3>
        <input type="email" id="email" class="form-control mb-2" placeholder="Email" value="sishohanr786@gmail.com">
        <input type="password" id="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-primary w-100 mb-2" id="loginBtn">Login</button>
        <small><a href="#" id="forgotBtn">Forgot Password?</a></small>
        <div id="msg" class="text-danger mt-2"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
    authDomain: "fir-i-family-mart.firebaseapp.com",
    projectId: "fir-i-family-mart",
    storageBucket: "fir-i-family-mart.firebasestorage.app",
    messagingSenderId: "73889024539",
    appId: "1:73889024539:web:271561c9dba17b5a6b06be"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginBtn').addEventListener('click', async ()=>{
    const email=document.getElementById('email').value;
    const password=document.getElementById('password').value;
    try{
        await signInWithEmailAndPassword(auth,email,password);
        window.location="index.html";
    }catch(err){
        document.getElementById('msg').innerText=err.message;
    }
});

document.getElementById('forgotBtn').addEventListener('click', async ()=>{
    const email=document.getElementById('email').value;
    if(!email){ alert("Email দিন!"); return; }
    try{ await sendPasswordResetEmail(auth,email); alert("Reset link পাঠানো হয়েছে"); }
    catch(err){ alert(err.message); }
});
</script>
</body>
</html>
