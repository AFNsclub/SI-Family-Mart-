<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
.login-box { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
.login-box h2 { text-align: center; margin-bottom: 20px; }
#message { font-size: 14px; color: red; text-align: center; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="login-box">
    <h2>Login</h2>
    <div id="message"></div>
    <input type="email" id="email" class="form-control mb-2" placeholder="ইমেল লিখুন">
    <input type="password" id="password" class="form-control mb-2" placeholder="পাসওয়ার্ড">
    <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
    <button class="btn btn-link w-100" onclick="resetPassword()">Forget Password?</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
  authDomain: "fir-i-family-mart.firebaseapp.com",
  projectId: "fir-i-family-mart",
  storageBucket: "fir-i-family-mart.firebasestorage.app",
  messagingSenderId: "73889024539",
  appId: "1:73889024539:web:271561c9dba17b5a6b06be",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Redirect if already logged in
onAuthStateChanged(auth, user => {
    if(user) { location.href = "index.html"; }
});

// Login Function
window.login = () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('message');
    msg.innerText = '';
    if(!email || !password) { msg.innerText = 'ইমেল এবং পাসওয়ার্ড দুইটাই লাগবে'; return; }
    
    signInWithEmailAndPassword(auth, email, password)
        .then(userCredential => { location.href = "index.html"; })
        .catch(error => { msg.innerText = error.message; });
};

// Password Reset Function
window.resetPassword = () => {
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('message');
    msg.innerText = '';
    if(!email) { msg.innerText = 'ইমেল লিখুন পাসওয়ার্ড রিসেট করার জন্য'; return; }
    
    sendPasswordResetEmail(auth, email)
        .then(() => { msg.style.color = 'green'; msg.innerText = 'পাসওয়ার্ড রিসেট লিঙ্ক আপনার ইমেলে পাঠানো হয়েছে'; })
        .catch(error => { msg.innerText = error.message; });
};
</script>
</body>
</html>
