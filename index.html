<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S I Family Mart | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .card { border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>এস আই ফ্যামিলি মার্ট</h1>
    <p>দোকানের হিসাব ও ইনভেন্টরি</p>
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card p-4 shadow">
                <h4>নতুন বিক্রি (কাপড়/ইমিটেশন গহনা)</h4>
                <input type="text" id="itemName" class="form-control mb-2" placeholder="পণ্যের নাম">
                <input type="number" id="salePrice" class="form-control mb-2" placeholder="দাম (টাকা)">
                <button class="btn btn-success w-100" onclick="addSale()">বিক্রি সেভ করুন</button>
            </div>
        </div>
        <div class="col-md-6 text-center">
            <div class="card p-4 shadow">
                <h4>আজকের মোট বিক্রি</h4>
                <h2 id="totalSales" class="text-primary">০ টাকা</h2>
                <div id="salesList" class="text-start mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
    authDomain: "fir-i-family-mart.firebaseapp.com",
    projectId: "fir-i-family-mart",
    storageBucket: "fir-i-family-mart.firebasestorage.app",
    messagingSenderId: "73889024539",
    appId: "1:73889024539:web:271561c9dba17b5a6b06be"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.addSale = async function() {
    const name = document.getElementById('itemName').value;
    const price = document.getElementById('salePrice').value;
    const today = new Date().toISOString().split('T')[0];

    if(name && price) {
      await addDoc(collection(db, "sales"), {
        item: name,
        amount: Number(price),
        date: today,
        time: new Date().toLocaleTimeString()
      });
      document.getElementById('itemName').value = '';
      document.getElementById('salePrice').value = '';
      alert("হিসাব সেভ হয়েছে!");
    }
  };

  const todayDate = new Date().toISOString().split('T')[0];
  const q = query(collection(db, "sales"), where("date", "==", todayDate));
  onSnapshot(q, (snapshot) => {
    let total = 0;
    let html = "<ul>";
    snapshot.forEach((doc) => {
      total += doc.data().amount;
      html += `<li>${doc.data().item}: ${doc.data().amount} টাকা</li>`;
    });
    html += "</ul>";
    document.getElementById('totalSales').innerText = total + " টাকা";
    document.getElementById('salesList').innerHTML = html;
  });
</script>
</body>
</html>
