<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
:root { --primary:#2563eb; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --bg:#f8fafc; }
body { background:var(--bg); font-family:'Segoe UI', sans-serif; display:none; }
#loginPage { display: flex; align-items: center; justify-content: center; height: 100vh; background: #1e3a8a; }
.header { text-align:center; padding:30px 20px; background:linear-gradient(135deg,var(--primary),#1e3a8a); color:#fff; border-radius:0 0 30px 30px; }
.header .btn { margin:5px; border-radius:10px; font-weight:600; transition: 0.3s; border:none; }
.stats .card { border-radius:15px; text-align:center; padding:20px; color:white; border:none; box-shadow:0 5px 15px rgba(0,0,0,0.08); }
.bg-sale { background: linear-gradient(135deg,#84cc16,#10b981); }
.bg-profit { background: linear-gradient(135deg,#2563eb,#3b82f6); }
.bg-expense { background: linear-gradient(135deg,#6366f1,#a855f7); }
.bg-inventory { background: linear-gradient(135deg,#f59e0b,#f97316); }
.bg-due { background: linear-gradient(135deg,#ef4444,#f87171); }
</style>
</head>
<body>

<div id="loginPage">
    <div class="card p-4 shadow-lg" style="width: 350px; border-radius: 20px;">
        <h4 class="text-center fw-bold mb-4 text-primary">Admin Login</h4>
        <input type="text" id="adminUser" class="form-control mb-3 rounded-pill" placeholder="Username">
        <input type="password" id="adminPass" class="form-control mb-3 rounded-pill" placeholder="Password">
        <button class="btn btn-primary w-100 rounded-pill fw-bold" onclick="handleLogin()">Login</button>
    </div>
</div>

<div id="adminContent">
    <div class="container mt-4">
        <header class="header">
            <h2 class="fw-bold">S.I. Family Mart Admin</h2>
            <div class="mt-3 d-flex flex-wrap justify-content-center gap-2">
                <a href="pos.html" class="btn btn-light text-primary">🛒 POS</a>
                <a href="stock.html" class="btn btn-info text-white">📦 Stock</a>
                <a href="supplier.html" class="btn btn-secondary text-white">🚛 Supplier</a>
                <a href="ledger.html" class="btn btn-warning text-dark">📔 Ledger</a>
                <a href="report.html" class="btn btn-success text-white">📊 Report</a>
                <button class="btn btn-danger" onclick="logout()">🚪 Logout</button>
            </div>
        </header>

        <section class="stats mt-4">
            <div class="row g-3">
                <div class="col-6 col-md-4"><div class="card bg-sale"><h6>আজকের বিক্রি</h6><h3 id="dS">০৳</h3></div></div>
                <div class="col-6 col-md-4"><div class="card bg-profit"><h6>আজকের লাভ</h6><h3 id="dP">০৳</h3></div></div>
                <div class="col-6 col-md-4"><div class="card bg-expense"><h6>আজকের খরচ</h6><h3 id="dE">০৳</h3></div></div>
                <div class="col-6 col-md-6"><div class="card bg-inventory"><h6>স্টক ভ্যালু</h6><h3 id="iV">০৳</h3></div></div>
                <div class="col-6 col-md-6"><div class="card bg-due"><h6>মোট বাকি</h6><h3 id="dDue">০৳</h3></div></div>
            </div>
        </section>

        <div class="text-center mt-5">
            <button class="btn btn-primary px-5 py-3 rounded-pill shadow-lg fw-bold" data-bs-toggle="modal" data-bs-target="#dueModal">💰 বাকি টাকা জমা নিন</button>
        </div>
    </div>
</div>

<div class="modal fade" id="dueModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0">
      <div class="modal-header bg-primary text-white"><h5>সতর্ক বাকি জমা</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body p-4">
        <label class="small fw-bold">কাস্টমার সিলেক্ট করুন:</label>
        <input type="text" id="dueCustName" class="form-control mb-3" placeholder="নাম টাইপ করুন..." list="customerSuggestions" oninput="checkDueAmount(this.value)">
        
        <div id="dueNotice" class="alert alert-warning py-2 d-none">
            বর্তমান বকেয়া: <span id="currentDueVal" class="fw-bold">০</span>৳
        </div>

        <label class="small fw-bold">জমার পরিমাণ:</label>
        <input type="number" id="payAmount" class="form-control mb-3" placeholder="টাকা লিখুন">
        
        <button class="btn btn-success w-100 fw-bold py-2 shadow" onclick="collectDue()">কনফার্ম পেমেন্ট</button>
      </div>
    </div>
  </div>
</div>

<datalist id="customerSuggestions"></datalist>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function handleLogin() {
    const user = document.getElementById('adminUser').value;
    const pass = document.getElementById('adminPass').value;
    if(user === "admin" && pass === "1234") {
        sessionStorage.setItem('isLogged', 'true');
        showDashboard();
    } else { alert("ভুল ইউজার বা পাসওয়ার্ড!"); }
}

function showDashboard() {
    document.body.style.display = 'block';
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
}

function logout() { sessionStorage.clear(); window.location.reload(); }

window.onload = () => { if(sessionStorage.getItem('isLogged')) showDashboard(); else document.body.style.display = 'block'; };

// Data Update
db.collection('sales').onSnapshot(snap => {
    let sale=0, profit=0, due=0, exp=0;
    const today = new Date().toISOString().split('T')[0];
    snap.forEach(doc => {
        const d = doc.data();
        if(d.date === today) {
            if(d.type === 'EXPENSE') exp += Number(d.total || 0);
            else { sale += Number(d.total || 0); profit += Number(d.profit || 0); }
        }
        due += Number(d.due || 0);
    });
    document.getElementById('dS').innerText = Math.round(sale) + "৳";
    document.getElementById('dP').innerText = Math.round(profit) + "৳";
    document.getElementById('dE').innerText = Math.round(exp) + "৳";
    document.getElementById('dDue').innerText = due < 0 ? "০৳" : Math.round(due) + "৳";
});

db.collection('inventory').onSnapshot(snap => {
    let val=0; snap.forEach(doc => { val += (Number(doc.data().stock)*Number(doc.data().buy)); });
    document.getElementById('iV').innerText = Math.round(val) + "৳";
});

let customers = [];
db.collection('customers').onSnapshot(snap => {
    const list = document.getElementById('customerSuggestions');
    list.innerHTML = ""; customers = [];
    snap.forEach(doc => {
        const d = doc.data();
        customers.push({name: doc.id, due: d.due || 0});
        const opt = document.createElement('option'); opt.value = doc.id; list.appendChild(opt);
    });
});

function checkDueAmount(val) {
    const found = customers.find(c => c.name === val);
    if(found) {
        document.getElementById('currentDueVal').innerText = Math.round(found.due);
        document.getElementById('dueNotice').classList.remove('d-none');
    } else {
        document.getElementById('dueNotice').classList.add('d-none');
    }
}

async function collectDue() {
    const name = document.getElementById('dueCustName').value;
    const amount = Number(document.getElementById('payAmount').value);
    const found = customers.find(c => c.name === name);

    if(!found) return alert("কাস্টমার খুঁজে পাওয়া যায়নি!");
    if(amount <= 0) return alert("সঠিক পরিমাণ লিখুন!");
    
    // মাইনাস হওয়া আটকানোর প্রধান শর্ত (বকেয়ার চেয়ে বেশি টাকা জমা নেওয়া যাবে না)
    if(amount > Math.round(found.due)) {
        return alert("ভুল এন্ট্রি! কাস্টমারের মোট বকেয়া মাত্র " + Math.round(found.due) + " টাকা। এর বেশি শোধ নেওয়া সম্ভব নয়।");
    }

    if(confirm(`${name} এর কাছ থেকে ${amount}৳ জমা নিচ্ছেন?`)) {
        try {
            const today = new Date().toISOString().split('T')[0];
            await db.collection('sales').add({
                customer: name, total: amount, profit: 0, due: -amount,
                date: today, type: "DUE_COLLECTION"
            });
            await db.collection('customers').doc(name).update({ 
                due: firebase.firestore.FieldValue.increment(-amount) 
            });
            alert("সফলভাবে জমা হয়েছে!");
            document.getElementById('dueCustName').value = "";
            document.getElementById('payAmount').value = "";
            bootstrap.Modal.getInstance(document.getElementById('dueModal')).hide();
        } catch (e) { alert("ত্রুটি! আবার চেষ্টা করুন।"); }
    }
}
</script>
</body>
</html>
