<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Dashboard</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container mt-4">
    <header class="header">
        <h1>S.I. Family Mart Dashboard</h1>
        <p>বংশীপুর, শ্যামনগর, সাতক্ষীরা</p>
        <div>
            <a href="pos.html" class="btn btn-primary">POS / Billing</a> 
            <a href="stock.html" class="btn btn-success">Stock Management</a>
            <a href="report.html" class="btn btn-warning">Reports</a>
            <a href="login.html" class="btn btn-danger" id="logoutBtn">Logout</a>
        </div>
    </header>

    <section class="stats mt-4">
        <div class="row g-3">
            <div class="col-md-4 card bg-sale"><h5>আজকের বিক্রি</h5><h3 id="dS">0</h3></div>
            <div class="col-md-4 card bg-profit"><h5>আজকের লাভ</h5><h3 id="dP">0</h3></div>
            <div class="col-md-4 card bg-inventory"><h5>স্টক মান</h5><h3 id="iV">0</h3></div>
        </div>
    </section>

    <section class="charts mt-5">
        <canvas id="salesChart" height="150"></canvas>
    </section>
</div>
<script src="app.js"></script>
<script src="graph.js"></script>
<script>
document.getElementById('logoutBtn').addEventListener('click', () => {
    firebase.auth().signOut().then(()=>{location.href='login.html';});
});
</script>
</body>
</html>
