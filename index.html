<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Dashboard</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container mt-4">
    <header class="header d-flex justify-content-between align-items-center">
        <div>
            <h1>S.I. Family Mart Dashboard</h1>
            <p>বংশীপুর, শ্যামনগর, সাতক্ষীরা</p>
        </div>
        <div>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
    </header>

    <div class="mt-3">
        <a href="pos.html" class="btn btn-primary">POS / Billing</a> 
        <a href="stock.html" class="btn btn-success">Stock Management</a>
        <a href="report.html" class="btn btn-warning">Reports</a>
        <a href="supplier.html" class="btn btn-info">Suppliers</a>
        <a href="expense.html" class="btn btn-secondary">Expenses</a>
    </div>

    <section class="stats mt-4">
        <div class="row g-3">
            <div class="col-md-4 card bg-sale"><h5>আজকের বিক্রি</h5><h3 id="dS">0</h3></div>
            <div class="col-md-4 card bg-profit"><h5>আজকের লাভ</h5><h3 id="dP">0</h3></div>
            <div class="col-md-4 card bg-inventory"><h5>স্টক মান</h5><h3 id="iV">0</h3></div>
        </div>
    </section>

    <section class="charts mt-5">
        <canvas id="salesChart" height="150"></canvas>
    </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
    authDomain: "fir-i-family-mart.firebaseapp.com",
    projectId: "fir-i-family-mart",
    storageBucket: "fir-i-family-mart.firebasestorage.app",
    messagingSenderId: "73889024539",
    appId: "1:73889024539:web:271561c9dba17b5a6b06be"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// --- Auth State Check ---
onAuthStateChanged(auth, user => {
    if(!user){
        window.location = "login.html";  // Redirect to login if not logged in
    }
});

// --- Logout ---
document.getElementById('logoutBtn').addEventListener('click', async ()=>{
    await signOut(auth);
    alert("Logout Successful!");
    window.location = "login.html";
});
</script>

<script src="graph.js"></script>
<script src="app.js"></script>
</body>
</html>
