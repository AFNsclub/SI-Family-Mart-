<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="loginContainer" class="container mt-5">
    <h2>Login to S.I. Family Mart</h2>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="Email">
    </div>
    <div class="mb-3">
        <label>Password</label>
        <input type="password" id="loginPass" class="form-control" placeholder="Password">
        <button id="togglePass" class="btn btn-sm btn-outline-secondary mt-1">Show/Hide</button>
    </div>
    <div class="mb-3">
        <button id="loginBtn" class="btn btn-primary w-100">Login</button>
        <button id="resetBtn" class="btn btn-warning w-100 mt-2">Forgot Password</button>
    </div>
</div>

<div id="app" class="container mt-4" style="display:none">
    <header class="header">
        <h1>S.I. Family Mart Dashboard</h1>
        <p>বংশীপুর, শ্যামনগর, সাতক্ষীরা</p>
        <div>
            <a href="pos.html" class="btn btn-primary">POS / Billing</a>
            <a href="stock.html" class="btn btn-success">Stock Management</a>
            <a href="supplier.html" class="btn btn-info">Supplier</a>
            <a href="expense.html" class="btn btn-warning">Expenses</a>
            <a href="report.html" class="btn btn-dark">Reports</a>
            <button id="logoutBtn" class="btn btn-outline-danger">Logout</button>
        </div>
    </header>

    <section class="stats mt-4">
        <div class="row g-3">
            <div class="col-md-4 card bg-sale"><h5>আজকের বিক্রি</h5><h3 id="dS">0</h3></div>
            <div class="col-md-4 card bg-profit"><h5>আজকের লাভ</h5><h3 id="dP">0</h3></div>
            <div class="col-md-4 card bg-inventory"><h5>স্টক মান</h5><h3 id="iV">0</h3></div>
        </div>
    </section>

    <section class="charts mt-5">
        <canvas id="salesChart" height="150"></canvas>
    </section>
</div>

<script type="module" src="app.js"></script>
<script src="graph.js"></script>
<script>
    // Login actions
    import { loginUser, logoutUser, resetPassword } from './app.js';

    const loginBtn = document.getElementById('loginBtn');
    const resetBtn = document.getElementById('resetBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const togglePass = document.getElementById('togglePass');
    const loginPass = document.getElementById('loginPass');

    loginBtn.addEventListener('click',()=>loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPass').value));
    resetBtn.addEventListener('click',()=>resetPassword(document.getElementById('loginEmail').value));
    logoutBtn.addEventListener('click',()=>logoutUser());
    togglePass.addEventListener('click',()=>{ loginPass.type = loginPass.type==='password'?'text':'password'; });
</script>
</body>
</html>
