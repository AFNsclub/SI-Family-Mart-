<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>এস আই ফ্যামিলি মার্ট | ডিজিটাল মেমো ও ডাটাবেস</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .header { background: #1a2a6c; color: white; padding: 15px; text-align: center; }
        .receipt-box { display: none; background: white; border: 2px solid #333; padding: 20px; margin-top: 20px; border-radius: 10px; font-family: 'Courier New', Courier, monospace; }
        @media print { .no-print { display: none; } .receipt-box { display: block; border: none; box-shadow: none; } }
    </style>
</head>
<body>

<div class="header no-print shadow">
    <h3>এস আই ফ্যামিলি মার্ট</h3>
    <p>স্মার্ট মেমো ও অটো-হিসাব সিস্টেম</p>
</div>

<div class="container mt-4 no-print">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card p-4 shadow-sm border-0">
                <h5 class="text-primary mb-3">🛒 নতুন বিক্রি ও মেমো</h5>
                <input type="text" id="custName" class="form-control mb-2" placeholder="কাস্টমারের নাম">
                <input type="text" id="itemName" class="form-control mb-2" placeholder="পণ্যের নাম (যেমন: থ্রি-পিস/গহনা)">
                <input type="number" id="itemPrice" class="form-control mb-2" placeholder="একক মূল্য (টাকা)">
                <input type="number" id="itemQty" class="form-control mb-2" placeholder="পরিমাণ (পিস)">
                <button class="btn btn-primary w-100" onclick="generateAndSave()">মেমো তৈরি ও সেভ করুন</button>
            </div>
        </div>
    </div>
</div>

<div id="receipt" class="container receipt-box shadow-lg">
    <div class="text-center">
        <h4>এস আই ফ্যামিলি মার্ট</h4>
        <p>বংশীপুর গ্রাম</p>
        <hr>
    </div>
    <div class="row">
        <div class="col-6"><p><b>তারিখ:</b> <span id="rDate"></span></p></div>
        <div class="col-6 text-end"><p><b>মেমো নং:</b> <span id="rID"></span></p></div>
    </div>
    <p><b>কাস্টমার:</b> <span id="rCust"></span></p>
    <table class="table table-bordered">
        <thead class="table-light">
            <tr><th>বিবরণ</th><th>পরিমাণ</th><th>মোট দাম</th></tr>
        </thead>
        <tbody>
            <tr>
                <td id="rItem"></td>
                <td id="rQty"></td>
                <td id="rTotal"></td>
            </tr>
        </tbody>
    </table>
    <div class="text-end">
        <h4>সর্বমোট: <span id="rGrandTotal"></span> টাকা</h4>
    </div>
    <hr>
    <p class="text-center">আমাদের থেকে কেনাকাটা করার জন্য ধন্যবাদ!</p>
    <div class="d-grid gap-2 no-print">
        <button class="btn btn-success" onclick="window.print()">মেমো প্রিন্ট/সেভ করুন</button>
        <button class="btn btn-outline-secondary" onclick="location.reload()">নতুন বিক্রি শুরু করুন</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
    authDomain: "fir-i-family-mart.firebaseapp.com",
    projectId: "fir-i-family-mart",
    storageBucket: "fir-i-family-mart.firebasestorage.app",
    messagingSenderId: "73889024539",
    appId: "1:73889024539:web:271561c9dba17b5a6b06be"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.generateAndSave = async function() {
    const name = document.getElementById('custName').value || "নগদ কাস্টমার";
    const item = document.getElementById('itemName').value;
    const price = Number(document.getElementById('itemPrice').value);
    const qty = Number(document.getElementById('itemQty').value);
    const total = price * qty;
    const date = new Date().toISOString().split('T')[0];

    if(!item || !price || !qty) return alert("দয়া করে সব তথ্য পূরণ করুন।");

    try {
      // Firebase-এ ডাটা সেভ করা
      const docRef = await addDoc(collection(db, "sales"), {
        customer: name,
        item: item,
        price: price,
        qty: qty,
        total: total,
        date: date,
        time: new Date().toLocaleTimeString()
      });

      // মেমোতে ডাটা দেখানো
      document.getElementById('rDate').innerText = new Date().toLocaleDateString();
      document.getElementById('rID').innerText = docRef.id.substring(0, 6).toUpperCase();
      document.getElementById('rCust').innerText = name;
      document.getElementById('rItem').innerText = item;
      document.getElementById('rQty').innerText = qty;
      document.getElementById('rTotal').innerText = total;
      document.getElementById('rGrandTotal').innerText = total;

      document.getElementById('receipt').style.display = 'block';
      alert("হিসাব ডাটাবেসে সেভ হয়েছে এবং মেমো তৈরি হয়েছে!");
    } catch (e) {
      alert("ডাটা সেভ করতে সমস্যা হয়েছে। দয়া করে রুলস চেক করুন।");
    }
  }
</script>

</body>
</html>
