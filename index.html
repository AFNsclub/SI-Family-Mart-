<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মায়াঘর | অ্যাডমিন ড্যাশবোর্ড</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --primary:#2563eb; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --bg:#f1f5f9; }
body { background:var(--bg); font-family:'Segoe UI', Tahoma, sans-serif; padding-bottom: 30px; }

/* মোবাইল ফ্রেন্ডলি হেডার */
.header { text-align:center; padding:30px 15px; background:linear-gradient(135deg,var(--primary),#1e3a8a); color:#fff; border-radius:0 0 30px 30px; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
.header h1 { font-size: 1.5rem; }
.header .btn { font-size: 0.85rem; padding: 8px 15px; border-radius: 10px; border: none; transition: 0.3s; }

/* স্ট্যাটাস কার্ড */
.stats .card { border-radius:15px; text-align:center; padding:15px; color:white; border:none; box-shadow:0 5px 15px rgba(0,0,0,0.08); }
.stats h6 { font-size: 0.8rem; margin-bottom: 5px; opacity: 0.9; }
.stats h3 { font-size: 1.2rem; font-weight: 700; margin: 0; }

.bg-sale { background: linear-gradient(135deg,#84cc16,#10b981); }
.bg-profit { background: linear-gradient(135deg,#2563eb,#3b82f6); }
.bg-inventory { background: linear-gradient(135deg,#f59e0b,#f97316); }
.bg-due { background: linear-gradient(135deg,#ef4444,#f87171); }

/* চার্ট কন্টেইনার */
.chart-card { background:white; padding:15px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.03); margin-top:15px; border: 1px solid #e2e8f0; }
.chart-title { font-size: 0.9rem; font-weight: 700; color: #475569; margin-bottom: 15px; display: block; }

/* চার্ট হাইট কন্ট্রোল */
.chart-box { position: relative; width: 100%; height: 250px; }
#mainTrendBox { height: 200px; }

@media (max-width: 576px) {
    .header h1 { font-size: 1.2rem; }
    .stats .col-6 { padding: 5px; }
    .chart-box { height: 220px; }
}
</style>
</head>
<body>

<div class="container mt-0 mt-md-3">
    <header class="header">
        <h1 class="fw-bold">মায়াঘর Admin Panel</h1>
        <p class="small opacity-75">বংশীপুর, শ্যামনগর, সাতক্ষীরা</p>
        <div class="mt-3 d-flex flex-wrap justify-content-center gap-2">
            <a href="pos.html" class="btn btn-light text-primary shadow-sm">🛒 POS</a>
            <a href="stock.html" class="btn btn-info text-white shadow-sm">📦 Stock</a>
            <a href="expense.html" class="btn btn-danger text-white shadow-sm">💸 Expense</a>
            <a href="report.html" class="btn btn-success shadow-sm">📊 Report</a>
            <button class="btn btn-dark shadow-sm" data-bs-toggle="modal" data-bs-target="#dueModal">💰 বাকি জমা</button>
            <button class="btn btn-outline-light" onclick="handleLogout()">🚪</button>
        </div>
    </header>

    <section class="stats mt-3 px-1">
        <div class="row g-2">
            <div class="col-6 col-md-3"><div class="card bg-sale"><h6>আজকের বিক্রি</h6><h3 id="dS">০৳</h3></div></div>
            <div class="col-6 col-md-3"><div class="card bg-profit"><h6>আজকের লাভ</h6><h3 id="dP">০৳</h3></div></div>
            <div class="col-6 col-md-3"><div class="card bg-inventory"><h6>স্টক ভ্যালু</h6><h3 id="iV">০৳</h3></div></div>
            <div class="col-6 col-md-3"><div class="card bg-due"><h6>মোট বাকি</h6><h3 id="dDue">০৳</h3></div></div>
        </div>
    </section>

    <section class="px-1">
        <div class="chart-card">
            <span class="chart-title text-center">📈 গত ৭ দিনের বিক্রয় গ্রাফ</span>
            <div class="chart-box" id="mainTrendBox">
                <canvas id="weeklySalesChart"></canvas>
            </div>
        </div>

        <div class="row g-2">
            <div class="col-md-6">
                <div class="chart-card">
                    <span class="chart-title text-center">👑 সেরা ৫ কাস্টমার</span>
                    <div class="chart-box">
                        <canvas id="topBuyersChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <span class="chart-title text-center">⚠️ সর্বোচ্চ ৫ বকেয়া</span>
                    <div class="chart-box">
                        <canvas id="topDueChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<div class="modal fade" id="dueModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered mx-auto" style="max-width: 90%;">
      <div class="modal-content border-0 shadow" style="border-radius: 20px;">
        <div class="modal-header bg-primary text-white py-2">
            <h6 class="modal-title">💰 বাকি জমা নিন</h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-3">
          <input type="text" id="dueCustName" class="form-control rounded-pill mb-2" placeholder="কাস্টমারের নাম" list="customerSuggestions" onchange="checkDueAmount(this.value)">
          <div id="dueAmountNotice" class="alert alert-warning p-2 d-none text-center rounded-3">বকেয়া: <span id="currentDueVal" class="fw-bold">০</span>৳</div>
          <input type="number" id="payAmount" class="form-control rounded-pill mb-2" placeholder="জমার পরিমাণ">
          <button id="btnCollect" class="btn btn-success w-100 rounded-pill fw-bold" onclick="collectDue()">কনফার্ম</button>
        </div>
      </div>
    </div>
</div>

<datalist id="customerSuggestions"></datalist>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let customerMap = {};

db.collection('sales').onSnapshot(snap => {
    let todaySale=0, todayProfit=0, totalDue=0, dailyTrend={};
    customerMap={};
    const today=new Date().toISOString().split('T')[0];
    const suggestions=document.getElementById('customerSuggestions');
    suggestions.innerHTML="";

    snap.forEach(doc => {
        const d=doc.data();
        const saleAmt=Number(d.totalPrice || d.total || 0);
        const profitAmt=Number(d.profit || 0);
        const dueAmt=Number(d.due || 0);

        if(d.date===today){ todaySale+=saleAmt; todayProfit+=profitAmt; }
        if(d.customer){
            const name = d.customer.trim();
            if(!customerMap[name]) customerMap[name]={name:name, due:0, spent:0};
            customerMap[name].due+=dueAmt;
            customerMap[name].spent+=saleAmt;
            totalDue+=dueAmt;
        }
        if(d.date) dailyTrend[d.date]=(dailyTrend[d.date]||0)+saleAmt;
    });

    document.getElementById('dS').innerText=Math.round(todaySale)+"৳";
    document.getElementById('dP').innerText=Math.round(todayProfit)+"৳";
    document.getElementById('dDue').innerText=Math.round(totalDue)+"৳";

    Object.keys(customerMap).forEach(name => {
        let opt=document.createElement('option'); opt.value=name; suggestions.appendChild(opt);
    });
    updateCharts(dailyTrend);
});

db.collection('inventory').onSnapshot(snap => {
    let invV=0;
    snap.forEach(doc => {
        const d=doc.data();
        invV+=(Number(d.stock||0)*Number(d.buy||0));
    });
    document.getElementById('iV').innerText=Math.round(invV)+"৳";
});

let sChart, dChart, bChart;
function updateCharts(trend){
    const dates=Object.keys(trend).sort().slice(-7);
    
    // বিক্রয় গ্রাফ (Line Chart)
    if(sChart) sChart.destroy();
    sChart = new Chart(document.getElementById('weeklySalesChart'),{
        type:'line',
        data:{labels:dates,datasets:[{label:'বিক্রি',data:dates.map(d=>trend[d]),borderColor:'#2563eb',borderWidth:3,pointRadius:4,fill:true,backgroundColor:'rgba(37,99,235,0.05)',tension:0.4}]},
        options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, grid:{display:false}}}}
    });

    // বকেয়া (Doughnut)
    const dueSorted=Object.values(customerMap).filter(x=>x.due>0).sort((a,b)=>b.due-a.due).slice(0,5);
    if(dChart) dChart.destroy();
    dChart=new Chart(document.getElementById('topDueChart'),{
        type:'doughnut',
        data:{labels:dueSorted.map(x=>x.name),datasets:[{data:dueSorted.map(x=>x.due),backgroundColor:['#ef4444','#f59e0b','#3b82f6','#10b981','#6366f1']}]},
        options:{responsive:true, maintainAspectRatio: false, plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}} }
    });

    // সেরা বায়ার (Horizontal Bar)
    const buySorted=Object.values(customerMap).sort((a,b)=>b.spent-a.spent).slice(0,5);
    if(bChart) bChart.destroy();
    bChart=new Chart(document.getElementById('topBuyersChart'),{
        type:'bar',
        data:{labels:buySorted.map(x=>x.name),datasets:[{label:'কেনাকাটা',data:buySorted.map(x=>x.spent),backgroundColor:'#10b981',borderRadius:5}]},
        options:{indexAxis:'y', responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}}}}
    });
}

function handleLogout() {
    if(confirm("Log out?")) auth.signOut().then(() => window.location.replace("login.html"));
}

function checkDueAmount(name) {
    const cust=customerMap[name.trim()];
    const notice = document.getElementById('dueAmountNotice');
    if(cust && cust.due > 0.5){
        document.getElementById('currentDueVal').innerText=Math.round(cust.due);
        notice.classList.remove('d-none');
        document.getElementById('payAmount').value=Math.round(cust.due);
    } else notice.classList.add('d-none');
}

async function collectDue() {
    const name=document.getElementById('dueCustName').value.trim();
    const amount=Number(document.getElementById('payAmount').value);
    if(!name || amount<=0) return;
    try {
        await db.collection('sales').add({
            customer:name, totalPrice:0, paidAmount:amount, profit:0, due:-amount, 
            date:new Date().toISOString().split('T')[0], type:"DUE_COLLECTION",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("জমা হয়েছে!");
        location.reload();
    } catch(e){ alert("Error!"); }
}
</script>
</body>
</html>
