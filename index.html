<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --primary:#2563eb; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --bg:#f1f5f9; --card-bg: rgba(255,255,255,0.85);
}
body { background:var(--bg); font-family:'Segoe UI', sans-serif; }
.header {
    text-align:center; padding:25px; background:linear-gradient(135deg,var(--primary),#1e3a8a);
    color:#fff; border-radius:0 0 30px 30px; box-shadow:0 10px 20px rgba(0,0,0,0.1);
}
.header h1 { font-weight:700; }
.header .btn { margin:5px; border-radius:50px; font-weight:600; transition:0.3s; }
.header .btn:hover { transform:scale(1.05); }

.stats .card {
    border-radius:20px; text-align:center; padding:20px; color:white; backdrop-filter:blur(8px);
    transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.stats .card:hover { transform:translateY(-5px); box-shadow:0 8px 25px rgba(0,0,0,0.2); }

.bg-sale { background:linear-gradient(135deg,#84cc16,#10b981); }
.bg-profit { background:linear-gradient(135deg,#2563eb,#3b82f6); }
.bg-inventory { background:linear-gradient(135deg,#f59e0b,#f97316); }
.bg-due { background:linear-gradient(135deg,#ef4444,#f87171); }

.chart-container { background:white; padding:20px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.05); margin-top:30px;}
</style>
</head>
<body>

<div class="container mt-4">

<header class="header">
<h1>S.I. Family Mart Admin Dashboard</h1>
<p>বংশীপুর, শ্যামনগর, সাতক্ষীরা</p>
<div>
<a href="pos.html" class="btn btn-primary">POS / Billing</a>
<a href="stock.html" class="btn btn-success">Stock Management</a>
<a href="ledger.html" class="btn btn-warning">Customer Ledger</a>
<a href="supplier.html" class="btn btn-info">Supplier Ledger</a>
<button class="btn btn-danger" id="logoutBtn">Logout</button>
</div>
</header>

<!-- Stats -->
<section class="stats mt-4">
<div class="row g-3">
<div class="col-md-3 card bg-sale">
<h5>আজকের বিক্রি</h5><h3 id="dS">0</h3>
</div>
<div class="col-md-3 card bg-profit">
<h5>আজকের লাভ</h5><h3 id="dP">0</h3>
</div>
<div class="col-md-3 card bg-inventory">
<h5>স্টক মান</h5><h3 id="iV">0</h3>
</div>
<div class="col-md-3 card bg-due">
<h5>আজকের মোট বাকি</h5><h3 id="dDue">0</h3>
</div>
</div>
</section>

<!-- Charts -->
<section class="charts mt-5">
<div class="chart-container">
<h5 class="mb-3">সাপ্তাহিক বিক্রি</h5>
<canvas id="weeklySalesChart" height="120"></canvas>
</div>

<div class="chart-container">
<h5 class="mb-3">মাসিক বিক্রি</h5>
<canvas id="monthlySalesChart" height="120"></canvas>
</div>

<div class="chart-container">
<h5 class="mb-3">মাসিক বনাম সাপ্তাহিক তুলনা</h5>
<canvas id="compareChart" height="120"></canvas>
</div>
</section>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
authDomain:"fir-i-family-mart.firebaseapp.com",
projectId:"fir-i-family-mart",
storageBucket:"fir-i-family-mart.firebasestorage.app",
messagingSenderId:"73889024539",
appId:"1:73889024539:web:271561c9dba17b5a6b06be"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

// Auth check
auth.onAuthStateChanged(user=>{if(!user) location.href='login.html';});
document.getElementById('logoutBtn').addEventListener('click',()=>{auth.signOut().then(()=>location.href='login.html');});

// --- Stats ---
const dS=document.getElementById('dS'), dP=document.getElementById('dP'), iV=document.getElementById('iV'), dDue=document.getElementById('dDue');

db.collection('sales').onSnapshot(snap=>{
    let totalSale=0, totalProfit=0, totalDue=0;
    const today=new Date().toISOString().split('T')[0];
    snap.forEach(doc=>{
        const data=doc.data();
        if(data.date===today){
            totalSale+=data.total||0;
            totalProfit+=data.profit||0;
            totalDue+=data.due||0;
        }
    });
    dS.innerText=Math.round(totalSale);
    dP.innerText=Math.round(totalProfit);
    dDue.innerText=Math.round(totalDue);
});

db.collection('inventory').onSnapshot(snap=>{
    let invValue=0;
    snap.forEach(doc=>{ const data=doc.data(); invValue+=(data.stock||0)*(data.buy||0); });
    iV.innerText=Math.round(invValue);
});

// --- Weekly Sales Chart ---
const weeklyCtx=document.getElementById('weeklySalesChart').getContext('2d');
const weeklyChart=new Chart(weeklyCtx,{
type:'line', data:{labels:[], datasets:[{label:'মোট বিক্রি', data:[], borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,0.2)', fill:true, tension:0.4}]},
options:{responsive:true, plugins:{legend:{display:true}}, scales:{x:{title:{display:true,text:'দিন'}}, y:{beginAtZero:true}}}
});

// --- Monthly Sales Chart ---
const monthlyCtx=document.getElementById('monthlySalesChart').getContext('2d');
const monthlyChart=new Chart(monthlyCtx,{
type:'bar', data:{labels:[], datasets:[{label:'মোট বিক্রি', data:[], backgroundColor:'#10b981'}]},
options:{responsive:true, plugins:{legend:{display:true}}, scales:{x:{title:{display:true,text:'মাস'}}, y:{beginAtZero:true}}}
});

// --- Compare Chart ---
const compareCtx=document.getElementById('compareChart').getContext('2d');
const compareChart=new Chart(compareCtx,{
type:'bar', data:{labels:[], datasets:[
    {label:'সাপ্তাহিক বিক্রি', data:[], backgroundColor:'#2563eb'},
    {label:'মাসিক বিক্রি', data:[], backgroundColor:'#10b981'}
]},
options:{responsive:true, plugins:{legend:{display:true}}, scales:{x:{title:{display:true,text:'দিন/মাস'}}, y:{beginAtZero:true}}}
});

// --- Load Chart Data ---
function loadCharts(){
    db.collection('sales').get().then(snap=>{
        let weeklyData={}, monthlyData={};
        snap.forEach(doc=>{
            const data=doc.data();
            const date=new Date(data.date);
            const day=date.toLocaleDateString('bn-BD',{weekday:'short'});
            const month=date.toLocaleDateString('bn-BD',{month:'short'});
            weeklyData[day]=(weeklyData[day]||0)+data.total;
            monthlyData[month]=(monthlyData[month]||0)+data.total;
        });
        // Weekly
        weeklyChart.data.labels=Object.keys(weeklyData);
        weeklyChart.data.datasets[0].data=Object.values(weeklyData);
        weeklyChart.update();

        // Monthly
        monthlyChart.data.labels=Object.keys(monthlyData);
        monthlyChart.data.datasets[0].data=Object.values(monthlyData);
        monthlyChart.update();

        // Compare Chart
        const combinedLabels=[...new Set([...Object.keys(weeklyData), ...Object.keys(monthlyData)])];
        compareChart.data.labels=combinedLabels;
        compareChart.data.datasets[0].data=combinedLabels.map(l=>weeklyData[l]||0);
        compareChart.data.datasets[1].data=combinedLabels.map(l=>monthlyData[l]||0);
        compareChart.update();
    });
}
loadCharts();

</script>
</body>
</html>
