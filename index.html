<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --primary: #2563eb;
    --secondary: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --bg: #f1f5f9;
    --card-bg: #ffffff;
  }

  body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; }

  .header {
    text-align: center;
    padding: 25px;
    background: linear-gradient(135deg, var(--primary), #1e3a8a);
    color: white;
    border-radius: 0 0 30px 30px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }

  .header h1 { font-weight: 700; }
  .header p { opacity: 0.8; }
  .header .btn { margin: 5px 5px; border-radius: 50px; font-weight: 600; }

  .stats .card {
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    text-align: center;
    padding: 20px;
    color: white;
  }

  .bg-sale { background: linear-gradient(135deg, #84cc16, #10b981); }
  .bg-profit { background: linear-gradient(135deg, #2563eb, #3b82f6); }
  .bg-inventory { background: linear-gradient(135deg, #f59e0b, #f97316); }

  .charts {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 20px;
    margin-top: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  canvas { max-width: 100%; }
</style>
</head>
<body>
<div class="container mt-4">
    <header class="header">
        <h1>S.I. Family Mart Dashboard</h1>
        <p>বংশীপুর, শ্যামনগর, সাতক্ষীরা</p>
        <div>
            <a href="pos.html" class="btn btn-primary">POS / Billing</a> 
            <a href="stock.html" class="btn btn-success">Stock Management</a>
            <a href="report.html" class="btn btn-warning">Reports</a>
            <a href="login.html" class="btn btn-danger" id="logoutBtn">Logout</a>
        </div>
    </header>

    <section class="stats mt-4">
        <div class="row g-3">
            <div class="col-md-4 card bg-sale">
                <h5>আজকের বিক্রি</h5>
                <h3 id="dS">0</h3>
            </div>
            <div class="col-md-4 card bg-profit">
                <h5>আজকের লাভ</h5>
                <h3 id="dP">0</h3>
            </div>
            <div class="col-md-4 card bg-inventory">
                <h5>স্টক মান</h5>
                <h3 id="iV">0</h3>
            </div>
        </div>
    </section>

    <section class="charts mt-5">
        <canvas id="salesChart" height="150"></canvas>
    </section>
</div>

<script src="app.js"></script>
<script src="graph.js"></script>
<script>
  // Logout functionality
  document.getElementById('logoutBtn').addEventListener('click', () => {
      firebase.auth().signOut().then(() => {
          location.href='login.html';
      });
  });
</script>
</body>
</html>
