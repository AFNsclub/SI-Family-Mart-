<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --primary:#2563eb; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --bg:#f8fafc; --dark:#1e293b; }
body { background:var(--bg); font-family:'Segoe UI', Tahoma, sans-serif; padding-bottom: 50px; }
.header { text-align:center; padding:40px 20px; background:linear-gradient(135deg,var(--primary),#1e3a8a); color:#fff; border-radius:0 0 40px 40px; box-shadow:0 10px 30px rgba(0,0,0,0.15); }
.header .btn { margin:5px; border-radius:12px; font-weight:600; padding: 10px 22px; transition: 0.3s; border:none; }
.stats .card { border-radius:20px; text-align:center; padding:25px; color:white; border:none; transition:0.3s; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
.bg-sale { background: linear-gradient(135deg,#84cc16,#10b981); }
.bg-profit { background: linear-gradient(135deg,#2563eb,#3b82f6); }
.bg-expense { background: linear-gradient(135deg,#f59e0b,#f97316); } /* খরচের জন্য নতুন কালার */
.bg-due { background: linear-gradient(135deg,#ef4444,#f87171); }
.chart-container { background:white; padding:25px; border-radius:20px; box-shadow:0 5px 20px rgba(0,0,0,0.05); margin-top:20px; }
/* সিকিউরিটি ওভারলে */
.login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="card p-4 text-center shadow-lg" style="width: 320px; border-radius: 25px; border:none;">
        <h4 class="fw-bold mb-2">S.I. Family Mart</h4>
        <p class="small text-muted mb-4">অ্যাডমিন পিন দিয়ে আনলক করুন</p>
        <input type="password" id="adminPin" class="form-control text-center mb-3 fs-4 rounded-pill" placeholder="••••">
        <button class="btn btn-primary w-100 fw-bold rounded-pill py-2" onclick="checkPin()">আনলক করুন</button>
    </div>
</div>

<div class="container mt-4" id="mainContent" style="display:none;">
    <header class="header">
        <h1 class="fw-bold">S.I. Family Mart Admin Panel</h1>
        <div class="mt-4 d-flex flex-wrap justify-content-center gap-2">
            <a href="pos.html" class="btn btn-light text-primary shadow">🛒 POS / Billing</a>
            <a href="stock.html" class="btn btn-info text-white shadow">📦 Stock Management</a>
            <a href="ledger.html" class="btn btn-warning text-dark shadow">📔 Ledger</a>
            <button class="btn btn-danger shadow" data-bs-toggle="modal" data-bs-target="#expenseModal">💸 খরচ যোগ</button>
            <button class="btn btn-success shadow" onclick="exportBackup()">💾 ব্যাকআপ (Excel)</button>
            <button class="btn btn-dark shadow" onclick="location.reload()">🔒 লক করুন</button>
        </div>
    </header>

    <section class="stats mt-4">
        <div class="row g-3 text-center">
            <div class="col-6 col-md-3"><div class="card bg-sale"><h6>আজকের বিক্রি</h6><h3 id="dS">০৳</h3></div></div>
            <div class="col-6 col-md-3"><div class="card bg-profit"><h6>আজকের নিট লাভ</h6><h3 id="nP">০৳</h3></div></div>
            <div class="col-6 col-md-3"><div class="card bg-expense"><h6>আজকের খরচ</h6><h3 id="dE">০৳</h3></div></div>
            <div class="col-6 col-md-3"><div class="card bg-due"><h6>মোট বাকি</h6><h3 id="dDue">০৳</h3></div></div>
        </div>
    </section>

    <section class="charts mt-2">
        <div class="row g-3">
            <div class="col-md-12">
                <div class="chart-container">
                    <h6 class="fw-bold mb-3 text-primary text-center">📈 লাভ বনাম খরচ (৭ দিন)</h6>
                    <canvas id="weeklySalesChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-container"><canvas id="topBuyersChart"></canvas></div>
            </div>
            <div class="col-md-6">
                <div class="chart-container"><canvas id="topDueChart"></canvas></div>
            </div>
        </div>
    </section>
</div>

<div class="modal fade" id="expenseModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow" style="border-radius:25px;">
      <div class="modal-header bg-danger text-white"><h5>💸 দোকানের খরচ যোগ করুন</h5></div>
      <div class="modal-body p-4">
        <input type="text" id="expNote" class="form-control mb-3 rounded-pill" placeholder="খরচের বিবরণ (যেমন: কারেন্ট বিল)">
        <input type="number" id="expAmount" class="form-control mb-3 rounded-pill" placeholder="টাকার পরিমাণ">
        <button class="btn btn-danger w-100 fw-bold rounded-pill" onclick="saveExpense()">খরচ সেভ করুন</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// ১. সিকিউরিটি পিন চেক
function checkPin() {
    if(document.getElementById('adminPin').value === "1234") {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    } else { alert("ভুল পিন!"); }
}

// ২. ডাটা ব্যাকআপ (CSV/Excel)
async function exportBackup() {
    const snap = await db.collection('customers').get();
    let csv = "Customer,Mobile,Due,Total_Spent\n";
    snap.forEach(doc => {
        const d = doc.data();
        csv += `${doc.id},${d.mobile || '-'},${d.due || 0},${d.totalSpent || 0}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Backup_${new Date().toLocaleDateString()}.csv`;
    a.click();
}

// ৩. খরচ ট্র্যাকিং
async function saveExpense() {
    const note = document.getElementById('expNote').value;
    const amt = Number(document.getElementById('expAmount').value);
    if(!amt) return alert("পরিমাণ দিন");
    await db.collection('expenses').add({
        note: note, amount: amt, date: new Date().toISOString().split('T')[0]
    });
    alert("খরচ সেভ হয়েছে!");
    location.reload();
}

// ৪. স্ট্যাটাস আপডেট (রিয়েল-টাইম)
db.collection('sales').onSnapshot(async snap => {
    let tSale=0, tProfit=0, tDue=0;
    const today = new Date().toISOString().split('T')[0];
    
    snap.forEach(doc => {
        const d = doc.data();
        if(d.date === today){ tSale += (Number(d.total) || 0); tProfit += (Number(d.profit) || 0); }
        tDue += (Number(d.due) || 0);
    });

    const expSnap = await db.collection('expenses').where('date', '==', today).get();
    let tExp = 0;
    expSnap.forEach(doc => tExp += (doc.data().amount || 0));

    document.getElementById('dS').innerText = Math.round(tSale) + "৳";
    document.getElementById('dE').innerText = Math.round(tExp) + "৳";
    document.getElementById('nP').innerText = Math.round(tProfit - tExp) + "৳";
    document.getElementById('dDue').innerText = Math.round(tDue) + "৳";
});

// ৫. হোয়াটসঅ্যাপ রিমাইন্ডার লজিক (চার্টের পাশে বা লেজারে ব্যবহার্য)
function sendWhatsAppReminder(name, mobile, due) {
    let text = `প্রিয় ${name}, S.I. Family Mart-এ আপনার বর্তমান বকেয়া ${due} টাকা। দ্রুত পরিশোধের অনুরোধ রইল। ধন্যবাদ।`;
    window.open(`https://wa.me/88${mobile}?text=${encodeURIComponent(text)}`, '_blank');
}

// চার্ট কোডগুলো আপনার আগের মতোই থাকবে... (নিচে চার্টের ফাংশনগুলো আগের মতো যুক্ত করে নিন)
</script>
</body>
</html>
