<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | POS</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="posApp" class="container mt-4">
    <header class="header mb-4">
        <h2>S.I. Family Mart | POS</h2>
        <a href="index.html" class="btn btn-secondary">Dashboard</a>
    </header>

    <div class="row g-3">
        <div class="col-md-5">
            <div class="card p-4">
                <h5>ক্রেতার তথ্য</h5>
                <input type="text" id="cust" class="form-control mb-3" placeholder="ক্রেতার নাম">
                <select id="sItem" class="form-select mb-3"></select>
                <div class="row g-2">
                    <div class="col-6"><input type="number" id="sQ" class="form-control" value="1"></div>
                    <div class="col-6"><button class="btn btn-warning w-100" onclick="addToCart()">+ কার্টে দিন</button></div>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4">
                <h5>কার্ট লিস্ট</h5>
                <table class="table table-sm">
                    <thead><tr><th>পণ্য</th><th>দাম</th><th>Qty</th><th>মোট</th><th>-</th></tr></thead>
                    <tbody id="cartBody"></tbody>
                </table>
                <div class="mt-3 border-top pt-3">
                    <div class="input-group mb-3">
                        <span class="input-group-text">ছাড়</span>
                        <input type="number" id="totalDisc" class="form-control" placeholder="0">
                        <select id="totalDType" class="form-select" style="max-width: 70px;">
                            <option value="cash">৳</option>
                            <option value="percent">%</option>
                        </select>
                    </div>
                    <button class="btn btn-success w-100" onclick="finalizeSale()">মেমো ও বিক্রি সম্পন্ন</button>
                </div>
            </div>
        </div>
    </div>

    <div id="receipt" class="receipt-box mt-4"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
