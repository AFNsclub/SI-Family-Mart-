<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | POS</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <header class="header">
        <h2>POS / Billing</h2>
        <a href="index.html" class="btn btn-secondary">ড্যাশবোর্ড</a>
    </header>

    <div class="row g-3 mt-4">
        <div class="col-md-5">
            <div class="card p-3">
                <h5>ক্রেতার নাম ও পণ্য নির্বাচন</h5>
                <input type="text" id="cust" class="form-control mb-2" placeholder="ক্রেতার নাম">
                <select id="sItem" class="form-select mb-2"></select>
                <div class="d-flex mb-2">
                    <input type="number" id="sQ" class="form-control me-2" value="1">
                    <button class="btn btn-warning flex-shrink-0" onclick="addToCart()">+ কার্টে দিন</button>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-3">
                <h5>কার্ট</h5>
                <table class="table table-sm">
                    <thead><tr><th>পণ্য</th><th>দাম</th><th>Qty</th><th>মোট</th><th>-</th></tr></thead>
                    <tbody id="cartBody"></tbody>
                </table>
                <div class="mt-2">
                    <div class="input-group mb-2">
                        <span class="input-group-text">ছাড়</span>
                        <input type="number" id="totalDisc" class="form-control" placeholder="0">
                        <select id="totalDType" class="form-select" style="max-width:70px;">
                            <option value="cash">৳</option>
                            <option value="percent">%</option>
                        </select>
                    </div>
                    <button class="btn btn-success w-100" onclick="finalizeSale()">মেমো ও বিক্রি সম্পন্ন</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Receipt -->
    <div id="receipt" class="card mt-4 p-3" style="display:none;">
        <h4 class="text-center">S.I. FAMILY MART</h4>
        <p class="text-center">বংশীপুর, সাতক্ষীরা | 📞 01568683171</p>
        <div class="d-flex justify-content-between">
            <div>ক্রেতা: <b id="rCust"></b><br>মেমো: <b id="rID"></b></div>
            <div>তারিখ: <b id="rDate"></b><br>সময়: <b id="rTime"></b></div>
        </div>
        <table class="table table-sm mt-2">
            <thead><tr><th>পণ্য</th><th class="text-center">QTY</th><th class="text-end">টাকা</th></tr></thead>
            <tbody id="rItemsBody"></tbody>
        </table>
        <div class="mt-2 border-top pt-2">
            <div class="d-flex justify-content-between"><span>উপ-মোট:</span> <span id="rSub">0</span>৳</div>
            <div id="rDiscRow" class="d-flex justify-content-between text-danger" style="display:none;"><span>ডিসকাউন্ট:</span> -<span id="rDisc">0</span>৳</div>
            <div class="d-flex justify-content-between fw-bold"><span>মোট দেয়:</span> <span id="rGrand">0</span>৳</div>
        </div>
        <div class="text-center mt-3">
            <button class="btn btn-dark" onclick="window.print()">প্রিন্ট করুন</button>
            <button class="btn btn-outline-secondary" onclick="location.reload()">নতুন মেমো</button>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
