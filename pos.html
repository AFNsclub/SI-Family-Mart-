<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS | S.I. Family Mart</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h2>POS / Billing</h2>
    <div class="row">
        <div class="col-md-5">
            <input type="text" id="cust" class="form-control mb-2" placeholder="ক্রেতার নাম">
            <select id="sItem" class="form-select mb-2"></select>
            <div class="input-group mb-2">
                <input type="number" id="sQ" class="form-control" value="1">
                <button class="btn btn-warning" onclick="addToCart()">কার্টে দিন</button>
            </div>
            <div class="input-group mb-2">
                <input type="number" id="totalDisc" class="form-control" placeholder="ছাড়">
                <select id="totalDType" class="form-select">
                    <option value="cash">৳</option>
                    <option value="percent">%</option>
                </select>
            </div>
            <button class="btn btn-success w-100" onclick="finalizeSale()">বিক্রি সম্পন্ন</button>
        </div>
        <div class="col-md-7">
            <table class="table table-sm">
                <thead><tr><th>পণ্য</th><th>দাম</th><th>Qty</th><th>মোট</th><th>-</th></tr></thead>
                <tbody id="cartBody"></tbody>
            </table>
        </div>
    </div>

    <div id="receipt" class="receipt-box">
        <h4>রিসিপ্ট</h4>
        <div id="rItemsBody"></div>
        <p>মোট: <span id="rGrand">0</span>৳</p>
    </div>
</div>
<script src="app.js" type="module"></script>
</body>
</html>
