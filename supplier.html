<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Supplier</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
<header class="header mb-4">
<h2>Supplier Management</h2>
<a href="index.html" class="btn btn-secondary">Dashboard</a>
</header>

<div class="card p-4">
<h5>Add Supplier</h5>
<div class="row g-2 mb-3">
    <div class="col-md-4"><input type="text" id="sName" class="form-control" placeholder="Supplier Name"></div>
    <div class="col-md-4"><input type="text" id="sPhone" class="form-control" placeholder="Phone"></div>
    <div class="col-md-4"><input type="text" id="sAddress" class="form-control" placeholder="Address"></div>
</div>
<button class="btn btn-success w-100" onclick="addSupplier()">Add Supplier</button>
</div>

<div id="supplierList" class="mt-4"></div>
<script type="module" src="app.js"></script>
</body>
</html>
