<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Supplier Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
:root {
    --primary:#2563eb; --success:#10b981; --bg:#f1f5f9; --card-bg:#fff;
}
body{background-color:var(--bg); font-family:'Segoe UI',sans-serif;}
.header{background:linear-gradient(135deg,var(--primary),#1e3a8a); color:#fff; text-align:center; padding:20px; border-radius:0 0 20px 20px;}
.header h2{margin:0; font-weight:700;}
.card{border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.05); padding:20px; margin-bottom:15px; background:var(--card-bg);}
input,select{border-radius:10px;}
table th, table td{font-size:14px;}
</style>
</head>
<body>

<div class="container mt-4">
    <header class="header">
        <h2>Supplier Management</h2>
        <p>নতুন সরবরাহকারী যুক্ত / আপডেট / মুছে ফেলুন</p>
    </header>

    <div class="card mt-4">
        <h5>নতুন সরবরাহকারী যুক্ত করুন</h5>
        <div class="row g-2 mb-3">
            <div class="col-md-4"><input type="text" id="sName" class="form-control" placeholder="Supplier Name"></div>
            <div class="col-md-4"><input type="text" id="sPhone" class="form-control" placeholder="Phone"></div>
            <div class="col-md-4"><input type="text" id="sAddress" class="form-control" placeholder="Address"></div>
        </div>
        <button class="btn btn-success" onclick="addSupplier()">Add / Update Supplier</button>
    </div>

    <div class="card mt-4">
        <h5>Supplier List</h5>
        <input type="text" id="searchSupplier" class="form-control mb-2" placeholder="Search Supplier">
        <table class="table table-sm table-bordered">
            <thead style="background:#e0e0e0;">
                <tr><th>Supplier Name</th><th>Phone</th><th>Address</th><th>Actions</th></tr>
            </thead>
            <tbody id="supplierBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();

auth.onAuthStateChanged(user=>{if(!user) location.href='login.html';});

let suppliers={}, supplierBody=document.getElementById('supplierBody');

db.collection('suppliers').onSnapshot(snap=>{
    suppliers={};
    snap.forEach(d=>{suppliers[d.id]=d.data();});
    renderSuppliers(document.getElementById('searchSupplier').value);
});

function renderSuppliers(filter=""){
    let html="";
    for(let id in suppliers){
        const sup=suppliers[id];
        if(filter && !sup.name.toLowerCase().includes(filter.toLowerCase())) continue;
        html+=`<tr>
            <td>${sup.name}</td>
            <td>${sup.phone}</td>
            <td>${sup.address}</td>
            <td>
                <button class="btn btn-sm btn-danger" onclick="deleteSupplier('${id}')">Delete</button>
            </td>
        </tr>`;
    }
    supplierBody.innerHTML=html;
}

function addSupplier(){
    const name=document.getElementById('sName').value.trim();
    const phone=document.getElementById('sPhone').value.trim();
    const address=document.getElementById('sAddress').value.trim();
    if(!name) return alert("Supplier name is required!");
    db.collection('suppliers').doc(name).set({name,phone,address}).then(()=>{alert("Supplier saved");});
}

function deleteSupplier(id){
    if(confirm("আপনি কি সত্যিই মুছে ফেলতে চান?")) db.collection('suppliers').doc(id).delete();
}

document.getElementById('searchSupplier').addEventListener('input',e=>{renderSuppliers(e.target.value);});
</script>
</body>
</html>
