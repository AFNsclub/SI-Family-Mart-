<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier Management | S.I. Family Mart</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
<header class="d-flex justify-content-between align-items-center mb-3">
<h2>Supplier Management</h2>
<button id="logoutBtn" class="btn btn-danger">Logout</button>
</header>

<div class="card p-4">
<h5>Add Supplier</h5>
<div class="row g-2 mb-2">
    <div class="col-md-4"><input type="text" id="supName" class="form-control" placeholder="Supplier Name"></div>
    <div class="col-md-4"><input type="text" id="supPhone" class="form-control" placeholder="Phone"></div>
    <div class="col-md-4"><input type="text" id="supAddress" class="form-control" placeholder="Address"></div>
</div>
<button class="btn btn-success w-100 mb-3" onclick="addSupplier()">Save Supplier</button>
<div id="supList" class="table-responsive"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, setDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
authDomain: "fir-i-family-mart.firebaseapp.com",
projectId: "fir-i-family-mart",
storageBucket: "fir-i-family-mart.firebasestorage.app",
messagingSenderId: "73889024539",
appId: "1:73889024539:web:271561c9dba17b5a6b06be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,user=>{if(!user)window.location="login.html";});
document.getElementById('logoutBtn').addEventListener('click',async()=>{await signOut(auth); window.location="login.html";});

window.addSupplier=async()=>{
    const name=document.getElementById('supName').value;
    const phone=document.getElementById('supPhone').value;
    const address=document.getElementById('supAddress').value;
    if(!name)return alert("Supplier Name দিন!");
    await setDoc(doc(db,"suppliers",name),{name,phone,address},{merge:true});
    alert("Supplier Added!"); location.reload();
};

onSnapshot(collection(db,"suppliers"),snap=>{
    let l="<table class='table table-sm'><thead><tr><th>Name</th><th>Phone</th><th>Address</th></tr></thead><tbody>";
    snap.forEach(d=>{const s=d.data(); l+=`<tr><td>${s.name}</td><td>${s.phone}</td><td>${s.address}</td></tr>`;});
    document.getElementById('supList').innerHTML=l+"</tbody></table>";
});
</script>
</body>
</html>
