<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Complete Reports</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;}
.header{background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;text-align:center;padding:25px;border-radius:0 0 30px 30px;}
.header h2{font-weight:700;margin:0;}
.card{border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,0.05);padding:20px;margin-bottom:20px;background:#fff;}
.table-hover tbody tr:hover{background:#f0f0f0;cursor:pointer;}
</style>
</head>
<body>

<div class="container mt-4">
  <header class="header">
    <h2>S.I. Family Mart | Complete Reports</h2>
    <p>বংশীপুর, শ্যামনগর, সাতক্ষীরা</p>
  </header>

  <!-- Filters & Downloads -->
  <div class="card mt-4">
    <div class="row g-2">
      <div class="col-md-3"><input type="date" id="startDate" class="form-control"></div>
      <div class="col-md-3"><input type="date" id="endDate" class="form-control"></div>
      <div class="col-md-2"><button class="btn btn-primary w-100" id="filterBtn">Filter</button></div>
      <div class="col-md-2"><button class="btn btn-success w-100" id="downloadExcelBtn">Download Excel</button></div>
      <div class="col-md-2"><button class="btn btn-danger w-100" id="downloadPDFBtn">Download PDF</button></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="row mt-4 g-3">
    <div class="col-md-3 card text-center"><h5>আজকের বিক্রি</h5><h3 id="dS">0</h3></div>
    <div class="col-md-3 card text-center"><h5>আজকের লাভ</h5><h3 id="dP">0</h3></div>
    <div class="col-md-3 card text-center"><h5>স্টক মান</h5><h3 id="iV">0</h3></div>
    <div class="col-md-3 card text-center"><h5>Total Due</h5><h3 id="totalDue">0</h3></div>
  </div>

  <!-- Charts -->
  <div class="card mt-4"><canvas id="salesChart" height="150"></canvas></div>
  <div class="card mt-4"><canvas id="topProductsChart" height="150"></canvas></div>

  <!-- Customer Ledger -->
  <div class="card mt-4">
    <h5>Customer Ledger / বাকি টাকা</h5>
    <input type="text" id="searchCust" class="form-control mb-2" placeholder="Customer Name দিয়ে Search করুন">
    <table class="table table-bordered table-hover">
      <thead><tr><th>ক্রেতার নাম</th><th>মোট বাকি</th><th>শেষ লেনদেনের তারিখ</th></tr></thead>
      <tbody id="customerLedger"></tbody>
    </table>
  </div>
</div>

<!-- Customer Details Modal -->
<div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Customer Details</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <p><strong>Name:</strong> <span id="modalName"></span></p>
        <p><strong>Total Due:</strong> <span id="modalDue"></span>৳</p>
        <table class="table table-bordered">
          <thead><tr><th>Memo</th><th>Date</th><th>Total</th><th>Paid</th><th>Due</th><th>Discount</th></tr></thead>
          <tbody id="modalHistory"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig={apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();

// Elements
const dS=document.getElementById('dS'), dP=document.getElementById('dP'), iV=document.getElementById('iV'), totalDueEl=document.getElementById('totalDue');
const ledgerTbody=document.getElementById('customerLedger'), searchInput=document.getElementById('searchCust');

let salesData=[], customerData=[], topProducts={};
let salesChart=null, topChart=null;

// Load Data
async function loadData(){
  const salesSnap=await db.collection('sales').get();
  salesData=[]; topProducts={};
  salesSnap.forEach(d=>{ const s=d.data(); salesData.push(s); s.items.forEach(it=>{topProducts[it.name]=(topProducts[it.name]||0)+it.qty;}); });

  const custSnap=await db.collection('customers').get();
  customerData=[];
  custSnap.forEach(d=>{ customerData.push({name:d.id, ...d.data()}); });
  
  renderLedger(); renderCharts(); updateStats();
}

// Stats
function updateStats(){
  const today=new Date().toISOString().split('T')[0];
  let sale=0, profit=0, totalDue=0;
  salesData.forEach(s=>{if(s.date===today){sale+=s.total; profit+=s.profit;}});
  dS.innerText=Math.round(sale); dP.innerText=Math.round(profit);
  db.collection('inventory').get().then(snap=>{ let val=0; snap.forEach(d=>{ const dt=d.data(); val+=(dt.stock||0)*(dt.buy||0); }); iV.innerText=Math.round(val);});
  customerData.forEach(c=>{totalDue+=c.due||0;}); totalDueEl.innerText=Math.round(totalDue);
}

// Charts
function renderCharts(){
  const daily={}; salesData.forEach(s=>{daily[s.date]=(daily[s.date]||0)+s.total;});
  const labels=Object.keys(daily).sort(); const data=labels.map(l=>daily[l]);
  if(salesChart) salesChart.destroy();
  salesChart=new Chart(document.getElementById('salesChart'),{type:'line',data:{labels,data,datasets:[{label:'Daily Sales', data, borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,0.2)', fill:true}]}, options:{responsive:true}});
  const topLabels=Object.keys(topProducts).sort((a,b)=>topProducts[b]-topProducts[a]).slice(0,5);
  const topValues=topLabels.map(l=>topProducts[l]);
  if(topChart) topChart.destroy();
  topChart=new Chart(document.getElementById('topProductsChart'),{type:'bar',data:{labels:topLabels,datasets:[{label:'Top Products',data:topValues, backgroundColor:'#10b981'}]}, options:{responsive:true}});
}

// Ledger
function renderLedger(search=""){
  let html=""; customerData.forEach(c=>{ if(c.name.toLowerCase().includes(search.toLowerCase())){ html+=`<tr data-name="${c.name}"><td>${c.name}</td><td>${c.due||0}৳</td><td>${c.lastDate||'-'}</td></tr>`; } });
  ledgerTbody.innerHTML=html;
  document.querySelectorAll('#customerLedger tr').forEach(r=>r.addEventListener('click',()=>showCustomerDetails(r.dataset.name)));
}
searchInput.addEventListener('input',e=>{renderLedger(e.target.value);});

// Customer Modal
function showCustomerDetails(name){
  const modal=new bootstrap.Modal(document.getElementById('detailsModal'));
  const cust=customerData.find(c=>c.name===name);
  document.getElementById('modalName').innerText=name;
  document.getElementById('modalDue').innerText=cust.due||0;
  db.collection('sales').where('customer','==',name).orderBy('date','desc').get().then(snap=>{
    let html=""; snap.forEach(doc=>{ const d=doc.data(); html+=`<tr><td>${d.memo}</td><td>${d.date}</td><td>${d.total}</td><td>${d.paid||0}</td><td>${d.due||0}</td><td>${d.discount||0}</td></tr>`; });
    document.getElementById('modalHistory').innerHTML=html; modal.show();
  });
}

// Filter
document.getElementById('filterBtn').addEventListener('click',()=>{
  const start=document.getElementById('startDate').value; const end=document.getElementById('endDate').value;
  let filtered=salesData.filter(s=>(!start||s.date>=start)&&(!end||s.date<=end));
  const daily={}; filtered.forEach(s=>{daily[s.date]=(daily[s.date]||0)+s.total;});
  const labels=Object.keys(daily).sort(); const data=labels.map(l=>daily[l]);
  if(salesChart) salesChart.destroy();
  salesChart=new Chart(document.getElementById('salesChart'),{type:'line',data:{labels,data,datasets:[{label:'Sales',data,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.2)',fill:true}]}, options:{responsive:true}});
});

// Excel Download
document.getElementById('downloadExcelBtn').addEventListener('click',()=>{
  const wb=XLSX.utils.book_new();
  const wsSales=XLSX.utils.json_to_sheet(salesData.map(s=>({Date:s.date, Customer:s.customer, Total:s.total, Paid:s.paid, Due:s.due, Discount:s.discount})));
  XLSX.utils.book_append_sheet(wb, wsSales, "Sales Summary");
  const wsTop=XLSX.utils.json_to_sheet(Object.keys(topProducts).map(p=>({Product:p, Qty:topProducts[p]})));
  XLSX.utils.book_append_sheet(wb, wsTop, "Top Products");
  const wsCust=XLSX.utils.json_to_sheet(customerData.map(c=>({Name:c.name, Due:c.due, LastDate:c.lastDate})));
  XLSX.utils.book_append_sheet(wb, wsCust, "Customer Ledger");
  XLSX.writeFile(wb, "SIFamilyMart_CompleteReport.xlsx");
});

// PDF Download
document.getElementById('downloadPDFBtn').addEventListener('click', async ()=>{
  const { jsPDF } = window.jspdf; const doc = new jsPDF('p','pt','a4'); let y=40;
  doc.setFontSize(18); doc.text("S.I. Family Mart | Complete Report",40,y); y+=20;
  const salesImg=document.getElementById('salesChart').toDataURL("image/png",1.0);
  doc.setFontSize(14); doc.text("Daily Sales Chart",40,y); y+=10; doc.addImage(salesImg,'PNG',40,y,500,200); y+=210;
  const topImg=document.getElementById('topProductsChart').toDataURL("image/png",1.0);
  doc.text("Top Products Chart",40,y); y+=10; doc.addImage(topImg,'PNG',40,y,500,200); y+=210;
  doc.text("Customer Ledger",40,y); y+=20;
  const tableData=customerData.map(c=>[c.name,c.due||0,c.lastDate||'-']);
  doc.autoTable({head:[['Name','Due','Last Transaction']], body:tableData, startY:y, theme:'grid'});
  doc.save("SIFamilyMart_CompleteReport.pdf");
});

loadData();
</script>
</body>
</html>
