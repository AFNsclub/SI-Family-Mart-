<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Register</title>
<link href="style.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-5" style="max-width:400px;">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">Register</h3>
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <div class="input-group mb-3">
            <input type="password" id="password" class="form-control" placeholder="Password">
            <button class="btn btn-outline-secondary" type="button" id="togglePass">Show</button>
        </div>
        <button class="btn btn-success w-100 mb-2" id="regBtn">Create Account</button>
        <p class="text-center mt-3"><a href="login.html">Back to Login</a></p>
        <div id="regMsg" class="text-center text-danger mt-2"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
authDomain: "fir-i-family-mart.firebaseapp.com",
projectId: "fir-i-family-mart",
storageBucket: "fir-i-family-mart.firebasestorage.app",
messagingSenderId: "73889024539",
appId: "1:73889024539:web:271561c9dba17b5a6b06be"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('regBtn').addEventListener('click', async ()=>{
    const email=document.getElementById('email').value;
    const pass=document.getElementById('password').value;
    try{
        await createUserWithEmailAndPassword(auth,email,pass);
        alert("Account created! Login now."); window.location="login.html";
    }catch(e){document.getElementById('regMsg').innerText=e.message;}
});

document.getElementById('togglePass').addEventListener('click', ()=>{
    const p=document.getElementById('password');
    p.type=p.type==='password'?'text':'password';
});
</script>
</body>
</html>
