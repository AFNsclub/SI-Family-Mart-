<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Management | S.I. Family Mart</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
<header class="d-flex justify-content-between align-items-center mb-3">
<h2>Stock Management</h2>
<button id="logoutBtn" class="btn btn-danger">Logout</button>
</header>

<div class="card p-4">
    <h5>Add / Update Product</h5>
    <div class="row g-2 mb-2">
        <div class="col-md-3"><input type="text" id="pBC" class="form-control" placeholder="Barcode"></div>
        <div class="col-md-3"><input type="text" id="pN" class="form-control" placeholder="Product Name"></div>
        <div class="col-md-2"><input type="number" id="tBuy" class="form-control" placeholder="Total Buy"></div>
        <div class="col-md-2"><input type="number" id="tQty" class="form-control" placeholder="Qty"></div>
        <div class="col-md-2"><input type="number" id="pS" class="form-control" placeholder="Sell Price"></div>
    </div>
    <button class="btn btn-success w-100 mb-3" onclick="addStock()">Save Stock</button>
    <div id="stockList" class="table-responsive"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, setDoc, doc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
authDomain: "fir-i-family-mart.firebaseapp.com",
projectId: "fir-i-family-mart",
storageBucket: "fir-i-family-mart.firebasestorage.app",
messagingSenderId: "73889024539",
appId: "1:73889024539:web:271561c9dba17b5a6b06be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,user=>{if(!user)window.location="login.html";});
document.getElementById('logoutBtn').addEventListener('click',async()=>{await signOut(auth); window.location="login.html";});

const fixNum = n=>isNaN(n)||n==null?0:Number(n);

window.addStock=async()=>{
    const bc=document.getElementById('pBC').value;
    const n=document.getElementById('pN').value;
    const tB=fixNum(document.getElementById('tBuy').value);
    const tQ=fixNum(document.getElementById('tQty').value);
    const sP=fixNum(document.getElementById('pS').value);
    if(!n||tQ<1) return alert("সঠিক তথ্য দিন!");
    await setDoc(doc(db,"inventory",n),{barcode:bc,name:n,buy:tB/tQ,sell:sP,stock:increment(tQ)},{merge:true});
    alert("Stock Updated!"); location.reload();
};

onSnapshot(collection(db,"inventory"),snap=>{
    let l="<table class='table table-sm'><thead><tr><th>Barcode</th><th>Name</th><th>Stock</th><th>Sell</th></tr></thead><tbody>";
    snap.forEach(d=>{const data=d.data(); l+=`<tr><td>${data.barcode}</td><td>${data.name}</td><td>${data.stock}</td><td>${data.sell}</td></tr>`;});
    document.getElementById('stockList').innerHTML=l+"</tbody></table>";
});
</script>
</body>
</html>
