<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Stock</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
<header class="header mb-4">
<h2>Stock Management</h2>
<a href="index.html" class="btn btn-secondary">Dashboard</a>
</header>

<div class="card p-4">
<h5>মাল এন্ট্রি</h5>
<div class="row g-2 mb-3">
    <div class="col-md-3"><input type="text" id="pBC" class="form-control" placeholder="বারকোড"></div>
    <div class="col-md-3"><input type="text" id="pN" class="form-control" placeholder="পণ্যের নাম"></div>
    <div class="col-md-2"><input type="number" id="tBuy" class="form-control" placeholder="মোট ক্রয়"></div>
    <div class="col-md-2"><input type="number" id="tQty" class="form-control" placeholder="মোট পিস"></div>
    <div class="col-md-2"><input type="number" id="pS" class="form-control" placeholder="বেচা দাম"></div>
</div>
<button class="btn btn-dark w-100" onclick="addStock()">স্টক সেভ করুন</button>
</div>

<div id="stockList" class="mt-4"></div>
<script type="module" src="app.js"></script>
</body>
</html>
