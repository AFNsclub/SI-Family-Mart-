<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Stock Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
:root {
    --primary: #2563eb;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --bg: #f1f5f9;
    --card-bg: #fff;
}
body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; }
.header { background: linear-gradient(135deg, var(--primary), #1e3a8a); color: #fff; text-align: center; padding: 20px; border-radius: 0 0 20px 20px;}
.header h2 { margin:0; font-weight:700;}
.card { border-radius: 15px; box-shadow:0 4px 15px rgba(0,0,0,0.05); padding:20px; margin-bottom:15px; background: var(--card-bg);}
input, select { border-radius:10px; }
table th, table td { font-size:14px; }
#barcodePreview { margin-top:5px; }
</style>
</head>
<body>

<div class="container mt-4">
    <header class="header">
        <h2>Stock Management</h2>
        <p>সুন্দরভাবে স্টক এড / আপডেট / ডিলিট করুন</p>
    </header>

    <div class="card mt-4">
        <h5>নতুন পণ্য যুক্ত করুন / আপডেট করুন</h5>
        <div class="row g-2 mb-3">
            <div class="col-md-3"><input type="text" id="pName" class="form-control" placeholder="পণ্যের নাম"></div>
            <div class="col-md-2"><input type="number" id="pBuy" class="form-control" placeholder="ক্রয় মূল্য"></div>
            <div class="col-md-2"><input type="number" id="pSell" class="form-control" placeholder="বিক্রয় মূল্য"></div>
            <div class="col-md-2"><input type="number" id="pStock" class="form-control" placeholder="স্টক"></div>
            <div class="col-md-3"><input type="text" id="pBarcode" class="form-control" placeholder="Barcode"></div>
        </div>
        <button class="btn btn-success" onclick="addOrUpdateItem()">Add / Update Item</button>
    </div>

    <div class="card mt-4">
        <h5>স্টক তালিকা</h5>
        <input type="text" id="searchItem" class="form-control mb-2" placeholder="Search Product">
        <table class="table table-sm table-bordered">
            <thead style="background:#e0e0e0;">
                <tr><th>পণ্য</th><th>ক্রয়</th><th>বিক্রয়</th><th>স্টক</th><th>Barcode</th><th>Actions</th></tr>
            </thead>
            <tbody id="stockBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => { if(!user) location.href='login.html'; });

let inv = {};
const stockBody = document.getElementById('stockBody');

function renderStock(filter=""){
    let html="";
    for(let name in inv){
        if(filter && !name.toLowerCase().includes(filter.toLowerCase())) continue;
        const item = inv[name];
        html+=`<tr>
            <td>${item.name}</td>
            <td>${item.buy}</td>
            <td>${item.sell}</td>
            <td>${item.stock}</td>
            <td>${item.barcode}</td>
            <td>
                <button class="btn btn-sm btn-danger" onclick="deleteItem('${item.name}')">Delete</button>
            </td>
        </tr>`;
    }
    stockBody.innerHTML = html;
}

db.collection('inventory').onSnapshot(snap=>{
    inv={};
    snap.forEach(d=>{ const data=d.data(); inv[data.name]=data; });
    renderStock(document.getElementById('searchItem').value);
});

function addOrUpdateItem(){
    const name = document.getElementById('pName').value.trim();
    const buy = Number(document.getElementById('pBuy').value);
    const sell = Number(document.getElementById('pSell').value);
    const stock = Number(document.getElementById('pStock').value);
    const barcode = document.getElementById('pBarcode').value.trim();
    if(!name || !buy || !sell || !stock) return alert("সকল তথ্য পূরণ করুন");
    db.collection('inventory').doc(name).set({name:name,buy:buy,sell:sell,stock:stock,barcode:barcode}).then(()=>{alert("পণ্য সংরক্ষিত হয়েছে");});
}

function deleteItem(name){
    if(confirm("আপনি কি সত্যিই মুছে ফেলতে চান?")) db.collection('inventory').doc(name).delete();
}

document.getElementById('searchItem').addEventListener('input', e=>{ renderStock(e.target.value); });
</script>
</body>
</html>
