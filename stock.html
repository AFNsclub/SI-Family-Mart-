<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Stock Management</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <header class="header">
        <h2>Stock Management</h2>
        <a href="index.html" class="btn btn-secondary">ড্যাশবোর্ড</a>
    </header>

    <div class="card p-3 mt-3">
        <h5>Stock এন্ট্রি</h5>
        <div class="row g-2 mb-2">
            <div class="col-md-3"><input type="text" id="pBC" class="form-control" placeholder="বারকোড"></div>
            <div class="col-md-3"><input type="text" id="pN" class="form-control" placeholder="পণ্যের নাম"></div>
            <div class="col-md-2"><input type="number" id="tBuy" class="form-control" placeholder="মোট ক্রয়"></div>
            <div class="col-md-2"><input type="number" id="tQty" class="form-control" placeholder="মোট পিস"></div>
            <div class="col-md-2"><input type="number" id="pS" class="form-control" placeholder="বেচা দাম"></div>
        </div>
        <button class="btn btn-dark w-100" onclick="addStock()">স্টক আপডেট করুন</button>
    </div>

    <div id="stockList" class="mt-4 table-responsive"></div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
