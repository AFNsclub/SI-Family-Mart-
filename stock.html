<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock | S.I. Family Mart</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h2>স্টক ম্যানেজমেন্ট</h2>
    <div class="row g-2 mb-3">
        <div class="col-md-3"><input type="text" id="pBC" class="form-control" placeholder="বারকোড"></div>
        <div class="col-md-3"><input type="text" id="pN" class="form-control" placeholder="পণ্যের নাম"></div>
        <div class="col-md-2"><input type="number" id="tBuy" class="form-control" placeholder="মোট ক্রয়"></div>
        <div class="col-md-2"><input type="number" id="tQty" class="form-control" placeholder="মোট পিস"></div>
        <div class="col-md-2"><input type="number" id="pS" class="form-control" placeholder="বেচা দাম"></div>
    </div>
    <button class="btn btn-dark w-100 mb-3" onclick="addStock()">স্টক আপডেট করুন</button>
    <div id="stockList" class="table-responsive"></div>
</div>
<script src="app.js" type="module"></script>
</body>
</html>
