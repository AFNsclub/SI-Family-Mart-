<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger Dashboard | S.I. Family Mart</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Chart + Excel -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{--primary:#2563eb;--danger:#ef4444;--success:#10b981;--bg:#f8fafc}
body{font-family:Arial;background:var(--bg);margin:0;padding-top:60px}
.nav-index{background:#fff;position:fixed;top:0;width:100%;display:flex;justify-content:center;gap:10px;padding:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.nav-index a{padding:6px 12px;background:#f1f5f9;border-radius:8px;text-decoration:none;color:#000;font-size:13px}
.nav-index a.active{background:var(--primary);color:#fff}
.container{max-width:1200px;margin:auto;padding:15px}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,.05)}
.summary-box{display:flex;gap:10px;flex-wrap:wrap}
.summary-item{flex:1;background:#fff;padding:15px;border-radius:10px;border-top:4px solid var(--primary)}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#f1f5f9}
.badge-pay{background:#dcfce7;color:#166534;padding:4px 8px;border-radius:6px}
.badge-buy{background:#fee2e2;color:#991b1b;padding:4px 8px;border-radius:6px}
.btn-call{background:var(--primary);color:white;padding:5px 10px;border-radius:6px;text-decoration:none;font-size:12px}
.btn{background:var(--success);color:#fff;border:none;padding:10px 15px;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<nav class="nav-index">
<a href="index.html">📊 Admin</a>
<a href="pos.html">🛒 POS</a>
<a href="stock.html">📦 Stock</a>
<a href="ledger.html" class="active">📔 Ledger</a>
<a href="expense.html">💸 Expense</a>
</nav>

<div class="container">

<div class="summary-box">
<div class="summary-item"><h4>মোট বাকি</h4><h2 id="totalDue">0৳</h2></div>
<div class="summary-item"><h4>আজকের কালেকশন</h4><h2 id="todayCollection">0৳</h2></div>
</div>

<div class="card">
<h3>📊 Customer Due Chart</h3>
<canvas id="dueChart"></canvas>
</div>

<div class="card">
<h3>🔥 Top 10 Due Customer</h3>
<div id="topDueList"></div>
</div>

<div class="card">

<div style="display:flex;justify-content:space-between;margin-bottom:10px">

<input type="text" id="searchCustomer" placeholder="Search customer..." onkeyup="searchCustomer()" style="padding:10px;border:1px solid #ddd;border-radius:8px">

<button onclick="exportExcel()" class="btn">📥 Backup Excel</button>

</div>

<table>

<thead>
<tr>
<th>কাস্টমার</th>
<th>মোবাইল</th>
<th>বাকি</th>
<th>স্ট্যাটাস</th>
<th>অ্যাকশন</th>
</tr>
</thead>

<tbody id="custBody"></tbody>

</table>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
authDomain:"fir-i-family-mart.firebaseapp.com",
projectId:"fir-i-family-mart"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

let dueChart

db.collection("sales").onSnapshot(snap=>{

let totalDue=0
let todayColl=0

let customerMap={}

const today=new Date().toISOString().split("T")[0]

snap.forEach(doc=>{

const d=doc.data()

const amt=Number(d.due||0)

if(d.date===today && d.type==="DUE_COLLECTION") todayColl+=Math.abs(amt)

if(d.customer){

if(!customerMap[d.customer]) customerMap[d.customer]={due:0,mobile:d.mobile}

customerMap[d.customer].due+=amt

}

})

const tbody=document.getElementById("custBody")
tbody.innerHTML=""

let chartNames=[]
let chartDue=[]

let arr=[]

for(let name in customerMap){

const c=customerMap[name]

if(c.due>0){

totalDue+=c.due

chartNames.push(name)

chartDue.push(Math.round(c.due))

arr.push({name,due:c.due})

}

tbody.innerHTML+=`
<tr>
<td>${name}</td>
<td>${c.mobile}</td>
<td style="color:${c.due>0?'red':'green'}">${Math.round(c.due)}৳</td>
<td><span class="${c.due>0?'badge-buy':'badge-pay'}">${c.due>0?'Due':'Paid'}</span></td>
<td><a class="btn-call" href="tel:${c.mobile}">📞 Call</a></td>
</tr>`

}

document.getElementById("totalDue").innerText=Math.round(totalDue)+"৳"
document.getElementById("todayCollection").innerText=Math.round(todayColl)+"৳"

updateChart(chartNames,chartDue)

updateTop(arr)

})

function updateChart(names,dues){

const ctx=document.getElementById("dueChart")

if(dueChart) dueChart.destroy()

dueChart=new Chart(ctx,{
type:"bar",
data:{
labels:names,
datasets:[{label:"Due",data:dues}]
}
})

}

function updateTop(arr){

arr.sort((a,b)=>b.due-a.due)

const top=arr.slice(0,10)

let html=""

top.forEach((c,i)=>{

html+=`<div style="display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:6px">
<span>${i+1}. ${c.name}</span>
<span style="color:red">${Math.round(c.due)}৳</span>
</div>`

})

document.getElementById("topDueList").innerHTML=html

}

function exportExcel(){

const table=document.querySelector("table")

const wb=XLSX.utils.table_to_book(table,{sheet:"Ledger"})

XLSX.writeFile(wb,"LedgerBackup.xlsx")

}

function searchCustomer(){

let input=document.getElementById("searchCustomer").value.toLowerCase()

let rows=document.querySelectorAll("#custBody tr")

rows.forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(input)?"":"none"

})

}

</script>

</body>
</html>
