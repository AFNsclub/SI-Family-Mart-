<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger Dashboard | S.I. Family Mart</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
:root { --primary: #2563eb; --dark: #1e293b; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin:0; color: #333; }
header { background: var(--dark); color:white; padding:20px; text-align:center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.container { padding:25px; max-width: 1200px; margin: auto; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
h3 { margin-top: 0; color: var(--primary); font-size: 1.2rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
button { padding:10px 18px; border:none; background: var(--primary); color:white; border-radius:8px; cursor:pointer; font-weight: 600; transition: 0.3s; }
.btn-payment { background: var(--success); margin-top: 10px; }
input { padding:10px; border: 1px solid #cbd5e1; border-radius: 8px; margin: 5px 0; }
table { width:100%; border-collapse:collapse; margin-top:15px; background: white; }
th,td { padding:12px; border:1px solid #e2e8f0; text-align:left; }
th { background: #f1f5f9; color: var(--dark); }
.customer-link { color: var(--primary); font-weight: bold; cursor: pointer; }
.badge-pay { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
.badge-buy { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
.summary-box { display: flex; gap: 20px; flex-wrap: wrap; }
.summary-item { flex: 1; min-width: 200px; background: #f8fafc; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); }
</style>
</head>

<body>

<header>
    <h2 style="margin:0;">S.I. Family Mart | লেজার ড্যাশবোর্ড</h2>
</header>

<div class="container">

  <div class="card">
    <h3>📊 হিসাবের সারাংশ (বকেয়া ভিত্তিক)</h3>
    <div class="summary-box">
        <div class="summary-item" style="border-left-color: var(--danger);"><h4>মোট বাকি</h4><p id="totalDue" style="color: var(--danger); font-size: 1.5rem; font-weight:bold;">০৳</p></div>
        <div class="summary-item" style="border-left-color: var(--success);"><h4>আজকের কালেকশন</h4><p id="todayCollection" style="color: var(--success); font-size: 1.5rem; font-weight:bold;">০৳</p></div>
    </div>
  </div>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h3>👥 বকেয়া কাস্টমার তালিকা</h3>
        <input type="text" id="searchCustomer" placeholder="নাম বা মোবাইল দিয়ে খুঁজুন..." onkeyup="searchCustomer()">
    </div>
    <div style="overflow-x: auto;">
        <table id="customerTable">
          <thead>
            <tr>
              <th>কাস্টমারের নাম</th>
              <th>মোবাইল</th>
              <th>বর্তমান বাকি</th>
              <th>অবস্থা</th>
              <th>অ্যাকশন</th>
            </tr>
          </thead>
          <tbody id="custBody"></tbody>
        </table>
    </div>
  </div>

  <div class="card" id="detailsSection" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px;">
        <div>
            <h3 id="detailTitle">লেনদেনের বিস্তারিত</h3>
            <p id="lastPayInfo" class="small text-muted"></p>
        </div>
        <div style="background: #f1f5f9; padding: 15px; border-radius: 10px; min-width: 280px;">
            <label class="fw-bold">বাকি টাকা জমা নিন:</label><br>
            <input type="number" id="payAmount" placeholder="টাকার পরিমাণ" style="width: 100%;">
            <button class="btn-payment" onclick="processPayment()" style="width: 100%;">💸 কনফার্ম জমা</button>
        </div>
    </div>
    
    <div style="overflow-x: auto;">
        <table id="transTable">
            <thead>
                <tr>
                    <th>তারিখ</th>
                    <th>ধরণ</th>
                    <th>পরিমাণ</th>
                    <th>ব্যালেন্স/বাকি</th>
                </tr>
            </thead>
            <tbody id="transBody"></tbody>
        </table>
    </div>
    <div class="mt-3 text-end" style="margin-top: 15px;">
        <button style="background:#64748b" onclick="downloadStatement()">📄 PDF স্টেটমেন্ট</button>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
    apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
    authDomain:"fir-i-family-mart.firebaseapp.com",
    projectId:"fir-i-family-mart",
    storageBucket:"fir-i-family-mart.firebasestorage.app",
    messagingSenderId:"73889024539",
    appId:"1:73889024539:web:271561c9dba17b5a6b06be"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentCustomer = "";

// ১. রিয়েল-টাইম ডাটা লোড
db.collection('sales').onSnapshot(snap => {
    let totalDue = 0, todayColl = 0;
    let customerMap = {};
    const today = new Date().toISOString().split('T')[0];

    snap.forEach(doc => {
        const d = doc.data();
        const dueVal = Number(d.due || 0);
        
        // আজকের কালেকশন হিসাব (যখন due মাইনাস হয় তখন সেটা কালেকশন)
        if(d.date === today && d.type === 'DUE_COLLECTION') {
            todayColl += Math.abs(dueVal);
        }

        if(d.customer) {
            if(!customerMap[d.customer]) {
                customerMap[d.customer] = { due: 0, mobile: d.mobile || '-', lastUpdate: d.date };
            }
            customerMap[d.customer].due += dueVal;
            if(d.date > customerMap[d.customer].lastUpdate) customerMap[d.customer].lastUpdate = d.date;
        }
    });

    // ২. ফিল্টারিং লজিক: শুধু বাকি থাকা কাস্টমার অথবা ১০ দিনের মধ্যে পরিশোধ করা কাস্টমার
    const filteredCustomers = {};
    const tenDaysAgo = new Date();
    tenDaysAgo.setDate(tenDaysAgo.getDate() - 10);

    for (let name in customerMap) {
        const c = customerMap[name];
        const lastDate = new Date(c.lastUpdate);
        
        // শর্ত: বাকি আছে অথবা (বাকি নেই কিন্তু ১০ দিন পার হয়নি)
        if (c.due > 1 || (c.due <= 1 && lastDate >= tenDaysAgo)) {
            filteredCustomers[name] = c;
            if(c.due > 0) totalDue += c.due;
        }
    }

    document.getElementById('totalDue').innerText = Math.round(totalDue) + "৳";
    document.getElementById('todayCollection').innerText = Math.round(todayColl) + "৳";
    renderCustomerTable(filteredCustomers);
});

function renderCustomerTable(data) {
    const tbody = document.getElementById('custBody');
    tbody.innerHTML = "";
    const names = Object.keys(data).sort((a, b) => data[b].due - data[a].due);

    names.forEach(name => {
        const c = data[name];
        const isPaid = c.due <= 1;
        tbody.innerHTML += `
            <tr>
                <td class="customer-link" onclick="showCustomerDetails('${name}')">${name}</td>
                <td>${c.mobile}</td>
                <td style="color: ${isPaid ? 'var(--success)' : 'var(--danger)'}; font-weight:bold;">${Math.round(c.due)}৳</td>
                <td><span class="${isPaid ? 'badge-pay' : 'badge-buy'}">${isPaid ? 'পরিশোধিত' : 'বকেয়া'}</span></td>
                <td><button onclick="showCustomerDetails('${name}')" style="padding:5px 10px; font-size:12px;">ইতিহাস</button></td>
            </tr>
        `;
    });
}

async function showCustomerDetails(name) {
    currentCustomer = name;
    document.getElementById('detailsSection').style.display = "block";
    document.getElementById('detailTitle').innerText = "লেনদেন ইতিহাস: " + name;
    const transBody = document.getElementById('transBody');
    transBody.innerHTML = "লোডিং...";

    const snap = await db.collection('sales').where('customer', '==', name).orderBy('date', 'asc').get();
    
    let html = "";
    let runningDue = 0;
    snap.forEach(doc => {
        const d = doc.data();
        const amt = Number(d.due || 0);
        runningDue += amt;
        
        const typeBadge = amt < 0 ? 
            `<span class="badge-pay">টাকা জমা</span>` : 
            `<span class="badge-buy">পণ্য ক্রয়</span>`;

        html = `
            <tr>
                <td>${d.date || '-'}</td>
                <td>${typeBadge}</td>
                <td>${Math.abs(amt)}৳</td>
                <td style="font-weight:bold;">${Math.round(runningDue)}৳</td>
            </tr>
        ` + html; // নতুনগুলো উপরে দেখাবে
    });
    transBody.innerHTML = html;
    window.scrollTo({ top: document.getElementById('detailsSection').offsetTop - 20, behavior: 'smooth' });
}

async function processPayment() {
    const amount = Number(document.getElementById('payAmount').value);
    if(!amount || amount <= 0) return alert("সঠিক পরিমাণ লিখুন");

    if(confirm(`${currentCustomer} এর কাছ থেকে ${amount}৳ জমা নিচ্ছেন?`)) {
        try {
            await db.collection('sales').add({
                customer: currentCustomer,
                total: amount,
                due: -amount,
                profit: 0,
                date: new Date().toISOString().split('T')[0],
                type: 'DUE_COLLECTION'
            });
            document.getElementById('payAmount').value = "";
            alert("জমা সফল হয়েছে!");
            showCustomerDetails(currentCustomer);
        } catch (e) { alert("ভুল হয়েছে!"); }
    }
}

function searchCustomer() {
    let input = document.getElementById("searchCustomer").value.toLowerCase();
    let tr = document.querySelectorAll("#custBody tr");
    tr.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none"; });
}

function downloadStatement() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text("S.I. Family Mart - Customer Ledger", 14, 20);
    doc.setFontSize(12);
    doc.text(`Customer Name: ${currentCustomer}`, 14, 30);
    doc.text(`Report Date: ${new Date().toLocaleDateString()}`, 14, 37);
    
    doc.autoTable({ html: '#transTable', startY: 45, theme: 'striped', headStyles: {fillColor: [37, 99, 235]} });
    doc.save(`Ledger_${currentCustomer}.pdf`);
}
</script>
</body>
</html>
