<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Expenses</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
:root{--primary:#2563eb; --success:#10b981; --danger:#ef4444; --bg:#f1f5f9; --card-bg:#fff;}
body{background-color:var(--bg); font-family:'Segoe UI',sans-serif;}
.header{background:linear-gradient(135deg,var(--primary),#1e3a8a); color:#fff; text-align:center; padding:20px; border-radius:0 0 20px 20px;}
.header h2{margin:0; font-weight:700;}
.card{border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.05); padding:20px; margin-bottom:15px; background:var(--card-bg);}
input,select{border-radius:10px;}
table th, table td{font-size:14px;}
</style>
</head>
<body>
<div class="container mt-4">
    <header class="header">
        <h2>Expense Management</h2>
        <p>খরচ যুক্ত / দেখুন / মুছে ফেলুন</p>
    </header>

    <div class="card mt-4">
        <h5>নতুন খরচ যুক্ত করুন</h5>
        <div class="row g-2 mb-3">
            <div class="col-md-4"><input type="text" id="eTitle" class="form-control" placeholder="Expense Title"></div>
            <div class="col-md-4"><input type="number" id="eAmount" class="form-control" placeholder="Amount"></div>
            <div class="col-md-4"><input type="date" id="eDate" class="form-control"></div>
        </div>
        <button class="btn btn-success" onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card mt-4">
        <h5>Expense List</h5>
        <input type="text" id="searchExpense" class="form-control mb-2" placeholder="Search Expense">
        <table class="table table-sm table-bordered">
            <thead style="background:#e0e0e0;">
                <tr><th>Title</th><th>Amount</th><th>Date</th><th>Actions</th></tr>
            </thead>
            <tbody id="expenseBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();
auth.onAuthStateChanged(user=>{if(!user) location.href='login.html';});

let expenses={}, expenseBody=document.getElementById('expenseBody');

db.collection('expenses').orderBy('date','desc').onSnapshot(snap=>{
    expenses={};
    snap.forEach(d=>{expenses[d.id]=d.data();});
    renderExpenses(document.getElementById('searchExpense').value);
});

function renderExpenses(filter=""){
    let html="";
    for(let id in expenses){
        const e=expenses[id];
        if(filter && !e.title.toLowerCase().includes(filter.toLowerCase())) continue;
        html+=`<tr>
            <td>${e.title}</td>
            <td>${e.amount}৳</td>
            <td>${e.date}</td>
            <td><button class="btn btn-sm btn-danger" onclick="deleteExpense('${id}')">Delete</button></td>
        </tr>`;
    }
    expenseBody.innerHTML=html;
}

function addExpense(){
    const title=document.getElementById('eTitle').value.trim();
    const amount=Number(document.getElementById('eAmount').value);
    const date=document.getElementById('eDate').value;
    if(!title||!amount||!date) return alert("All fields required");
    db.collection('expenses').add({title,amount,date});
    document.getElementById('eTitle').value='';
    document.getElementById('eAmount').value='';
    document.getElementById('eDate').value='';
}

function deleteExpense(id){
    if(confirm("আপনি কি সত্যিই মুছে ফেলতে চান?")) db.collection('expenses').doc(id).delete();
}

document.getElementById('searchExpense').addEventListener('input',e=>{renderExpenses(e.target.value);});
</script>
</body>
</html>
