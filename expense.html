<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I. Family Mart | Expense Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
:root { --primary:#ef4444; --success:#10b981; --bg:#f8fafc; }
body { background:var(--bg); font-family:'Segoe UI', sans-serif; }
.header { text-align:center; padding:30px; background:linear-gradient(135deg, #ef4444, #b91c1c); color:#fff; border-radius:0 0 30px 30px; }
.card { border-radius:20px; border:none; box-shadow:0 5px 15px rgba(0,0,0,0.05); }
.table thead { background: #fee2e2; color: #b91c1c; }
.btn-primary { background: #ef4444; border: none; border-radius: 10px; }
.btn-primary:hover { background: #dc2626; }
</style>
</head>
<body>

<div class="container mt-4">
    <header class="header shadow">
        <h2 class="fw-bold">💸 দোকান খরচ (Expense)</h2>
        <p class="mb-0">S.I. Family Mart | খরচ এন্ট্রি ও ট্র্যাকিং</p>
        <a href="admin.html" class="btn btn-light btn-sm mt-3 px-4 rounded-pill fw-bold">🔙 Back to Admin</a>
    </header>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card p-4 mb-4">
                <h5 class="fw-bold text-danger mb-3">নতুন খরচ যোগ করুন</h5>
                <div class="mb-3">
                    <label class="small fw-bold">খরচের ধরণ</label>
                    <select id="expCategory" class="form-select rounded-3">
                        <option value="দোকান ভাড়া">দোকান ভাড়া</option>
                        <option value="বিদ্যুৎ বিল">বিদ্যুৎ বিল</option>
                        <option value="স্টাফ বেতন">স্টাফ বেতন</option>
                        <option value="পরিবহন খরচ">পরিবহন খরচ</option>
                        <option value="নাস্তা/খাবার">নাস্তা/খাবার</option>
                        <option value="অন্যান্য">অন্যান্য</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">বিস্তারিত (ঐচ্ছিক)</label>
                    <input type="text" id="expNote" class="form-control" placeholder="যেমন: ফেব্রুয়ারির বিল">
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">টাকার পরিমাণ</label>
                    <input type="number" id="expAmount" class="form-control" placeholder="০.০০৳">
                </div>
                <button class="btn btn-primary w-100 fw-bold py-2" onclick="saveExpense()">খরচ জমা দিন</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0">আজকের খরচের তালিকা</h5>
                    <h5 class="text-danger fw-bold m-0">মোট: <span id="totalExpDay">০</span>৳</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ধরণ</th>
                                <th>বিস্তারিত</th>
                                <th>পরিমাণ</th>
                                <th>অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="expenseList">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config (একই কনফিগ ব্যবহার করা হয়েছে)
const firebaseConfig={apiKey:"AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",authDomain:"fir-i-family-mart.firebaseapp.com",projectId:"fir-i-family-mart",storageBucket:"fir-i-family-mart.firebasestorage.app",messagingSenderId:"73889024539",appId:"1:73889024539:web:271561c9dba17b5a6b06be"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const today = new Date().toISOString().split('T')[0];

// ১. খরচ সেভ করা
async function saveExpense() {
    const cat = document.getElementById('expCategory').value;
    const note = document.getElementById('expNote').value || "-";
    const amount = Number(document.getElementById('expAmount').value);

    if(amount <= 0) return alert("সঠিক টাকার পরিমাণ দিন!");

    try {
        await db.collection('sales').add({
            category: cat,
            note: note,
            total: amount,
            date: today,
            type: "EXPENSE", // এটি অ্যাডমিন প্যানেলে খরচ হিসেবে কাউন্ট হবে
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("খরচ সফলভাবে যোগ হয়েছে!");
        document.getElementById('expAmount').value = "";
        document.getElementById('expNote').value = "";
    } catch (e) { alert("ত্রুটি হয়েছে!"); }
}

// ২. খরচের তালিকা রিয়েল-টাইম লোড করা
db.collection('sales')
    .where('type', '==', 'EXPENSE')
    .where('date', '==', today)
    .onSnapshot(snap => {
        let html = "";
        let total = 0;
        snap.forEach(doc => {
            const d = doc.data();
            total += d.total;
            html += `
                <tr>
                    <td class="fw-bold text-dark">${d.category}</td>
                    <td class="text-muted small">${d.note}</td>
                    <td class="fw-bold">${Math.round(d.total)}৳</td>
                    <td><button class="btn btn-sm btn-outline-danger border-0" onclick="deleteExp('${doc.id}')">🗑️</button></td>
                </tr>
            `;
        });
        document.getElementById('expenseList').innerHTML = html;
        document.getElementById('totalExpDay').innerText = Math.round(total);
    });

// ৩. খরচ ডিলিট করা
async function deleteExp(id) {
    if(confirm("এই খরচটি কি ডিলিট করতে চান?")) {
        await db.collection('sales').doc(id).delete();
    }
}
</script>
</body>
</html>
