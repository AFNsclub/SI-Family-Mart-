<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses | S.I. Family Mart</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
<header class="d-flex justify-content-between align-items-center mb-3">
<h2>Expenses</h2>
<button id="logoutBtn" class="btn btn-danger">Logout</button>
</header>

<div class="card p-4">
<h5>Add Expense</h5>
<div class="row g-2 mb-2">
    <div class="col-md-4"><input type="text" id="expTitle" class="form-control" placeholder="Expense Title"></div>
    <div class="col-md-4"><input type="number" id="expAmount" class="form-control" placeholder="Amount"></div>
    <div class="col-md-4"><input type="date" id="expDate" class="form-control"></div>
</div>
<button class="btn btn-success w-100 mb-3" onclick="addExpense()">Save Expense</button>
<div id="expList" class="table-responsive"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBI8FZjLO48gYACKhJRkptj-y03NHRK5Ho",
authDomain: "fir-i-family-mart.firebaseapp.com",
projectId: "fir-i-family-mart",
storageBucket: "fir-i-family-mart.firebasestorage.app",
messagingSenderId: "73889024539",
appId: "1:73889024539:web:271561c9dba17b5a6b06be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,user=>{if(!user)window.location="login.html";});
document.getElementById('logoutBtn').addEventListener('click',async()=>{await signOut(auth); window.location="login.html";});

window.addExpense=async()=>{
    const title=document.getElementById('expTitle').value;
    const amount=Number(document.getElementById('expAmount').value);
    const date=document.getElementById('expDate').value;
    if(!title||amount<=0) return alert("সঠিক তথ্য দিন!");
    await addDoc(collection(db,"expenses"),{title,amount,date});
    alert("Expense Added!"); location.reload();
};

onSnapshot(collection(db,"expenses"),snap=>{
    let l="<table class='table table-sm'><thead><tr><th>Title</th><th>Amount</th><th>Date</th></tr></thead><tbody>";
    snap.forEach(d=>{const e=d.data(); l+=`<tr><td>${e.title}</td><td>${e.amount}</td><td>${e.date}</td></tr>`;});
    document.getElementById('expList').innerHTML=l+"</tbody></table>";
});
</script>
</body>
</html>
