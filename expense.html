<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses | S.I. Family Mart</title>
<link href="style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h2>Expenses Management</h2>
    <div class="row g-2 mb-3">
        <div class="col-md-4"><input type="text" id="expName" class="form-control" placeholder="Expense নাম"></div>
        <div class="col-md-3"><input type="number" id="expAmount" class="form-control" placeholder="টাকা"></div>
        <div class="col-md-3"><input type="date" id="expDate" class="form-control"></div>
        <div class="col-md-2"><button class="btn btn-danger w-100" onclick="addExpense()">Add Expense</button></div>
    </div>
    <div id="expenseList" class="table-responsive"></div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
